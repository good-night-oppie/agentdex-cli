name: review-comment-signoff-gate

# A review thread turns this gate green ONLY when its comment author signs off
# (an APPROVED review or a 👍 reaction) — clicking "Resolve" alone does not.
# Re-runs on review submit/dismiss so an approval flips it green; for a 👍-only
# sign-off, re-trigger with a push or close+reopen (reactions aren't a CI event).

on:
  pull_request:
    branches: [main]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  signoff:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: comment-author sign-off (approval or 👍; Resolve alone is not enough)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/_smoke_review_comment_signoff_gate.sh          # fixtures, no network
          python3 scripts/review_comment_signoff_gate.py --repo "$REPO" --pr "$PR_NUMBER"
