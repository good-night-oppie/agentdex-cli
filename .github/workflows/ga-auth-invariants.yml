# ga-auth-invariants.yml — gate the GA-AUTH security floor at the merge boundary.
#
# Why this exists: lint.yml + the review-comment-signoff gate only trigger on
# PRs to `main`, and the test suite (`uv run pytest packages/`) only runs in
# release.yml (nightly). But day-to-day work lands via PRs to `dev`, which had
# NO test gate at all — so a regression in the GA-AUTH security invariants
# (passwordless per ADR-0013, strict-CSP-safe assets, rate-limit fail-closed,
# anti-enumeration opaque errors, double-submit CSRF, anti-pay-to-rank,
# operator-surface-invisible-to-agents) would slip silently to the nightly
# release instead of being caught when it merges.
#
# This job runs ONLY the fast (~5s), deterministic, sidecar-free GA-AUTH
# invariant modules on every dev/main PR. Scope is deliberate: a REAL, narrow
# security gate — not a full-suite green-chase (AGENTS.md §CI-POLICY: merge
# UNSTABLE on the real gates; don't chase full-green over vendor/aaop drift).
#
# NOTE: the module list below is hand-maintained — a new GA-AUTH invariant
# module is NOT gated until it is added here. Follow-up (tracked): switch to a
# `-m ga_invariant` pytest marker so the gate is self-maintaining.

name: ga-auth-invariants

on:
  pull_request:
    branches: [dev, main]
  push:
    # Run on every push to main so the DEPLOYED commit carries a push-to-main
    # success run — the north-star probe's ga_auth_ci_attest attests the live
    # deployed sha against exactly that (event=push, branch=main).
    branches: [main]
  workflow_dispatch:

# Supersede in-flight PR runs on push-spam so the shared self-hosted runner is not
# held by stale commits — but NEVER cancel a push:main run: the live-SHA attester
# needs that success record, and ga-deploy queues/continues (doesn't cancel) deploys,
# so a canceled main-push gate would leave a deployed SHA with no green run to attest.
concurrency:
  group: ga-auth-invariants-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ga-auth-invariants:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 10
    steps:
      # Fork-PR posture (P1): FAIL-CLOSED, not skip. A job-level `if:` that skips
      # fork PRs reports the check as Success (GitHub treats a skipped job as
      # success), so a fork PR would pass the security gate WITHOUT running it. So
      # instead refuse fork PRs in a no-checkout first step that exits non-zero —
      # the check goes RED (blocks the PR) and the untrusted code is never checked
      # out onto the shared self-hosted runner. Same-repo PRs + workflow_dispatch
      # fall through. (Repo is private/no-forks today → defense-in-depth.)
      - name: Refuse fork PRs (fail-closed — never run untrusted code on self-hosted)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::GA-AUTH gate will not run a fork PR on the self-hosted runner. A maintainer must re-run it from a same-repo branch."
          exit 1

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.19"

      - name: Sync workspace
        # --frozen (NOT --locked): installs from the committed uv.lock without
        # re-resolving. --locked would additionally assert lock==pyproject and FAIL —
        # the committed uv.lock is already drifted from pyproject (CI-proven: `uv sync
        # --locked` errors "lockfile needs to be updated"), a pre-existing vendored-
        # package condition. Enforcing drift-detection requires first relocking the
        # whole workspace (separate change); until then --frozen keeps the gate
        # reproducible (no silent re-resolve) without false-failing on the stale lock.
        # --all-packages (not --package scoping): pytest lives in the workspace-ROOT
        # dev-dependency group, which a `--package <member>` sync drops (it installs
        # only that member's dependency tree) — scoping made the gate fail with
        # "Failed to spawn: pytest". The invariant modules import adx_showdown.sidecar
        # but never spawn a battle, so no node_modules / live sidecar is needed.
        run: uv sync --all-packages --frozen

      - name: Run GA-AUTH security invariant gate
        # ADX_REQUIRE_GA_BUNDLE=1 turns a missing/broken web/ga bundle from a
        # silent skip into a hard failure — a skipped security-invariant test is
        # a false-green, so the passwordless/CSP suite MUST actually execute.
        env:
          ADX_REQUIRE_GA_BUNDLE: "1"
        run: |
          uv run --no-sync pytest -q \
            packages/agentdex_arena/tests/test_ga_auth_rate_limit.py \
            packages/agentdex_arena/tests/test_ga_auth_pages.py \
            packages/agentdex_arena/tests/test_ga_auth_cookie_csrf.py \
            packages/agentdex_arena/tests/test_limiter.py \
            packages/agentdex_arena/tests/test_session_auth.py \
            packages/agentdex_arena/tests/test_admin_auth.py \
            packages/agentdex_arena/tests/test_email_login.py \
            packages/agentdex_arena/tests/test_badge_auth.py \
            packages/agentdex_arena/tests/test_membership_primitive.py \
            packages/agentdex_arena/tests/test_device_flow_endpoints.py \
            packages/agentdex_arena/tests/test_enroll_account.py \
            packages/agentdex_arena/tests/test_account_quota.py \
            packages/agentdex_arena/tests/test_q5_anti_pay_to_rank_property.py
