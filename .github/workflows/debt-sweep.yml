# Debt sweeper (G2 ep9 OpenAI). Recurring agent-driven cleanup, not human 20%.
name: debt-sweep
on:
  schedule:
    - cron: '17 6 * * 1'   # Mondays 06:17 UTC (off the :00 / :30 marks)
  workflow_dispatch:
jobs:
  sweep:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Scan harness drift
        run: |
          npx --yes --package=agentlint -- agentlint scan . --format=text || true
      - name: Doc-garden stale TODOs
        run: |
          grep -rEn '(TODO|FIXME|XXX).*[0-9]{4}-[0-9]{2}-[0-9]{2}' --include='*.md' . |             awk -F: '{ print $0 }' | head -50 > /tmp/stale-todos.txt || true
          test -s /tmp/stale-todos.txt && echo "::warning::stale dated TODOs found" || true
      # TODO: open PR with auto-fixes via codex/claude CLI in --yolo mode
