# lint.yml — pre-commit + ruff + mypy + detect-secrets gate on every PR.
#
# Closes H1 (workflow w0z1i9vcs): the .pre-commit-config.yaml had no
# enforcement layer before this — config-only theater. With this workflow,
# the rails become law at PR merge time (G2 ep6 [06-0028]) even when a
# contributor skips the local `bash scripts/install_hooks.sh` step.
#
# Runs on every PR + manual dispatch. Does NOT block main branch pushes
# because there is no main-branch trigger; pre-commit local hooks +
# .pre-commit-config.yaml DEFER_TO_PR_GATE policy is the existing
# practice (PRs are the merge boundary).

name: lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # pre-commit needs prev SHAs for diff hooks

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.19"

      - name: Sync workspace with dev deps
        run: |
          uv sync --group dev

      - name: Run pre-commit scoped to PR diff
        # Why scoped (--from-ref/--to-ref) not --all-files: the previous
        # full-tree mode blocked EVERY PR on pre-existing ruff-format drift
        # in main (e.g. scripts/llm_proxy_measure.py + tests/* — files
        # untouched by 99% of PRs). That made pre-commit a known-red gate
        # that reviewers were instructed to ignore (memory
        # reference_agentdex_precommit_vendor_redgate), which is the wrong
        # equilibrium — a green gate everyone trusts beats a red gate
        # everyone learns to ignore. Scoping to the PR's own diff restores
        # signal: hooks fail only when YOUR diff breaks them, mirroring the
        # `.pre-commit-config.yaml DEFER_TO_PR_GATE` philosophy and the
        # agents/review/AGENTS.md "your change's own checks, not full-tree
        # green" rule. Drift in main is recovered via a separate cleanup PR,
        # not by blocking every contributor.
        run: |
          uv run --no-sync pre-commit run \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref   "${{ github.event.pull_request.head.sha }}" \
            --show-diff-on-failure

  doc-lint:
    # DOC-LINT-031 closure: scripts/doc_lint.py (63 rules from
    # harness-engineering corpus) gated at PR merge so doc + spec
    # drift can't slip into main via the per-commit hook bypass
    # (`git commit --no-verify`).
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run doc_lint.py on the full tree
        run: |
          # Vendored copy; no extra deps required (stdlib only).
          python3 scripts/doc_lint.py
