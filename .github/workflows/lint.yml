name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.10
      - run: uv sync --extra all
      - run: uvx ruff@0.12.2 check .
      - run: uvx ruff@0.12.2 format --check .
