# GA pull-CD deploy: build the arena image, push to ghcr, and ring the on-box
# deploy doorbell. The Lightsail box `agentdex-arena-1` (agentdex.builders) runs
# adx-webhook.service (/opt/agentdex/webhook-listener.py) on loopback :9000,
# proxied by Caddy at https://agentdex.builders/webhook/deploy. CI never SSHes
# into prod — it publishes an image and POSTs an HMAC-signed "new image ready"
# webhook; the box pulls, restarts, health-gates /healthz, and rolls back on fail.
#
# Contract this workflow MUST satisfy (see webhook-listener.py):
#   POST https://agentdex.builders/webhook/deploy
#   header X-Hub-Signature-256: sha256=<hex hmac_sha256(ADX_WEBHOOK_SECRET, body)>
#   body   {"tag":"<[A-Za-z0-9._-]+>"}   (compact; the signed bytes == the sent bytes)
#   expect 202 (deploy runs async on the box)
# A byte-mismatch on the signature ⇒ 403. The signing scheme is pinned by
# packages/agentdex_cli/tests/test_deploy_webhook_signing.py — change all three
# (this file, that test, webhook-listener.py) together or deploys break.
name: ga-deploy

on:
  push:
    branches: [main]
    # Only redeploy when something that changes the running image changes — a
    # docs-only commit must not bounce the prod container.
    paths:
      - "packages/**"
      - "web/**"
      - "site/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ga-deploy.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build + deploy (default: commit SHA)"
        required: false
        type: string

concurrency:
  # Never run two deploys at once. The box also rejects a concurrent deploy with
  # 409, but cancelling a half-finished CI deploy is worse than queueing it —
  # so do NOT cancel in-progress.
  group: ga-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push to ghcr.io/good-night-oppie (same org as this repo)

env:
  IMAGE: ghcr.io/good-night-oppie/agentdex-arena
  DEPLOY_WEBHOOK_URL: https://agentdex.builders/webhook/deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        # Untrusted input (workflow_dispatch tag) is read via env, never
        # interpolated with ${{ }} into the shell (the M4 convention from
        # release.yml — env vars are not evaluated, so they cannot inject).
        # The on-box listener only accepts [A-Za-z0-9._-]; a git SHA always
        # qualifies, and a custom tag is rejected early if it would not.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$SHA}"
          if ! printf '%s' "$TAG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::tag '$TAG' has characters the on-box listener rejects ([A-Za-z0-9._-] only)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify on-box deploy listener (HMAC-signed)
        # Mirrors webhook-listener.py verify_hmac EXACTLY:
        #   sig = "sha256=" + hmac_sha256(ADX_WEBHOOK_SECRET, body).hexdigest()
        # Secret comes via env (never ${{ }} in shell); the body is non-secret.
        # The signed bytes (python reads stdin) are the SAME bytes curl sends
        # (--data-raw), so the box's compare_digest succeeds.
        #
        # Pre-cutover safety: if the ADX_WEBHOOK_SECRET repo secret is not yet
        # configured, the image is still built+pushed but the deploy is NOT
        # triggered — the workflow succeeds with a warning. This lets the PR
        # merge and validate the build half before the box is wired live.
        env:
          ADX_WEBHOOK_SECRET: ${{ secrets.ADX_WEBHOOK_SECRET }}
          DEPLOY_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${ADX_WEBHOOK_SECRET:-}" ]; then
            echo "::warning::ADX_WEBHOOK_SECRET not configured — image pushed but deploy NOT triggered (pre-cutover)."
            exit 0
          fi
          BODY="$(printf '{"tag":"%s"}' "$DEPLOY_TAG")"
          SIG="sha256=$(printf '%s' "$BODY" | python3 -c 'import hmac, hashlib, os, sys; print(hmac.new(os.environ["ADX_WEBHOOK_SECRET"].encode(), sys.stdin.buffer.read(), hashlib.sha256).hexdigest())')"
          CODE="$(curl -sS -o /tmp/deploy_resp.json -w '%{http_code}' \
            -X POST "$DEPLOY_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -H "X-Hub-Signature-256: $SIG" \
            --data-raw "$BODY")"
          echo "listener HTTP $CODE:"; cat /tmp/deploy_resp.json 2>/dev/null || true; echo
          if [ "$CODE" != "202" ]; then
            echo "::error::deploy webhook returned $CODE (expected 202)"
            exit 1
          fi
          echo "Deploy accepted for tag $DEPLOY_TAG — box will pull → restart → health-gate /healthz → rollback-on-fail."
