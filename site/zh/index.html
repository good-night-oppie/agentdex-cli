<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BENE — 带 hash-locked kill gate 的多智能体 harness</title>
<meta name="description" content="把 BENE 放进你已经在跑的 CrewAI 或 LangGraph。每个 prompt 上线前过一道 hash-locked gate。凌晨 3 点用 sqlite3 打开 bene.db，grep 上一个 agent 学到了什么。" />
<link rel="icon" type="image/svg+xml" href="assets/bene-logo.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bene: {
          bg: 'rgb(var(--bg) / <alpha-value>)',
          surface: 'rgb(var(--surface) / <alpha-value>)',
          accent: 'rgb(var(--accent) / <alpha-value>)',
          text: 'rgb(var(--text) / <alpha-value>)',
          dim: 'rgb(var(--dim) / <alpha-value>)',
          med: 'rgb(var(--med) / <alpha-value>)',
          muted: 'rgb(var(--muted) / <alpha-value>)',

}
</script>
<style>
:root, :root[data-theme="dark"] {
  --bg: 10 10 10;       /* #0A0A0A */
  --surface: 14 14 14;  /* #0E0E0E */
  --accent: 255 92 36;  /* #FF5C24 */
  --text: 237 237 237;  /* #EDEDED */
  --dim: 26 26 26;      /* #1A1A1A */
  --med: 34 34 34;      /* #222222 */
  --muted: 136 136 136; /* #888888 */
  --term: 5 5 5;        /* terminal background */
}
:root[data-theme="light"] {
  --bg: 250 250 250;    /* #FAFAFA */
  --surface: 245 245 245;/* #F5F5F5 */
  --accent: 194 84 27;  /* #C2541B (AA on light) */
  --text: 26 26 26;     /* #1A1A1A */
  --dim: 229 229 229;   /* #E5E5E5 */
  --med: 204 204 204;   /* #CCCCCC */
  --muted: 102 102 102; /* #666666 */
  --term: 14 11 22;     /* terminals stay dark in both themes */
}
body { background: rgb(var(--bg)); color: rgb(var(--text)); font-family:'Inter',sans-serif; transition: background-color .15s, color .15s; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background: rgb(var(--surface)); }
::-webkit-scrollbar-thumb { background: rgb(var(--med)); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background: rgb(var(--accent)); }
.hide-scrollbar::-webkit-scrollbar { display:none; }

</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─── Patagon-style helpers ──────────────────────────────────────────
const Section = ({ id, children, className = '', noBorder = false }) => (
  <section id={id} className={`py-24 ${noBorder ? '' : 'border-t border-bene-dim'} ${className}`}>
    <div className="max-w-6xl mx-auto px-6">{children}</div>
  </section>
);

const Kicker = ({ number, title }) => (
  <div className="flex items-center gap-4 mb-16">
    <span className="font-mono text-bene-accent text-sm">{number}</span>
    <div className="h-px bg-bene-dim flex-1" />
    <span className="font-mono text-bene-accent text-sm tracking-widest uppercase">{title}</span>
  </div>
);

const Card = ({ children, className = '' }) => (
  <div className={`bg-bene-surface border border-bene-dim p-8 ${className}`}>{children}</div>
);

const Terminal = ({ children, caption, copyText }) => {
  const [copied, setCopied] = React.useState(false);
  const onCopy = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(copyText);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }
    } catch (e) { /* swallow */ }
  };
  return (
    <div className="flex flex-col gap-3">
      <div className="bg-[rgb(var(--term))] border border-bene-dim rounded-sm overflow-hidden">
        <div className="flex items-center justify-between px-4 py-2.5 border-b border-bene-dim bg-bene-surface">
          <div className="flex gap-2">
            <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
            <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
            <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
          </div>
          {copyText && (
            <button onClick={onCopy} className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors"
              title="把安装命令拷到剪贴板">
              {copied ? '✓ 已复制' : '复制命令 ↗'}
            </button>
          )}
        </div>
        <div className="p-5 overflow-x-auto">
          <pre className="font-mono text-[13px] text-bene-text leading-relaxed"><code>{children}</code></pre>
        </div>
      </div>
      {caption && <p className="font-mono text-xs text-bene-muted">{caption}</p>}
    </div>
  );
};

const Pill = ({ children }) => (
  <div className="border border-bene-dim rounded-full px-4 py-2 font-mono text-xs text-bene-muted flex items-center gap-3 w-fit">
    <div className="w-1.5 h-1.5 rounded-full bg-bene-accent" />
    {children}
  </div>
);

// ─── Nav ────────────────────────────────────────────────────────────
const Nav = ({ theme, setTheme }) => {
  const links = [
    { id: 'gap', label: '01 Gap' },
    { id: 'contract', label: '02 Contract' },
    { id: 'comparison', label: '03 Integrates' },
    { id: 'proof', label: '04 Proof' },
    { id: 'recipes', label: '05 Recipes' },
    { id: 'architecture', label: '06 Arch' },
    { id: 'limits', label: '07 Limits' },
    { id: 'lore', label: '08 Lore' },
  ];
  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  };
  return (
    <nav className="fixed top-0 left-0 right-0 z-50 bg-bene-bg/90 backdrop-blur-md border-b border-bene-dim">
      <div className="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
        <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
          <svg viewBox="0 0 320 200" className="text-bene-accent h-5 w-auto" fill="currentColor" fillRule="evenodd" aria-label="BENE">
            <path d="M 38 26 H 112 Q 160 26 160 64 Q 160 100 112 100 H 38 Z M 58 42 H 112 Q 140 42 140 64 Q 140 84 112 84 H 58 Z M 38 100 H 112 Q 160 100 160 136 Q 160 174 112 174 H 38 Z M 58 116 H 112 Q 140 116 140 136 Q 140 158 112 158 H 58 Z"/>
            <path transform="translate(320,0) scale(-1,1)" d="M 38 26 H 112 Q 160 26 160 64 Q 160 100 112 100 H 38 Z M 58 42 H 112 Q 140 42 140 64 Q 140 84 112 84 H 58 Z M 38 100 H 112 Q 160 100 160 136 Q 160 174 112 174 H 38 Z M 58 116 H 112 Q 140 116 140 136 Q 140 158 112 158 H 58 Z"/>
          </svg>
          <span className="font-display font-bold tracking-widest text-sm">BENE</span>
        </div>
        <div className="flex items-center gap-3 md:gap-6">
          <div className="hidden md:flex items-center gap-6">
            {links.map(l => (
              <button key={l.id} onClick={() => scrollTo(l.id)} className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors">{l.label}</button>
            ))}
          </div>
          <a href="docs/index.html" className="font-mono text-xs text-bene-accent hover:bg-bene-accent/10 transition-colors border border-bene-accent rounded-sm px-3 py-1">文档 ↗</a>
          <a href="../SKILL.md" target="_blank" rel="noopener noreferrer" className="hidden sm:inline font-mono text-xs text-bene-text hover:text-bene-accent transition-colors" title="把这份扔给你的 agent，让它直接懂 BENE（raw markdown）">SKILL.md</a>
          <a href="https://github.com/EdwardTang/bene-site" target="_blank" rel="noopener noreferrer" className="hidden sm:inline font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors">GitHub</a>
          <a href="../" className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors border border-bene-dim rounded-sm px-2 py-1" title="Switch to English">EN</a>
          <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
            className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors border border-bene-dim rounded-sm px-2 py-1"
            aria-label={theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'}>
            {theme === 'dark' ? '◐ light' : '◑ dark'}
          </button>
        </div>
      </div>
    </nav>
  );
};

// ─── Copy-llms.txt button ───────────────────────────────────────────
// Fetches /bene/llms.txt, copies to the clipboard, flashes a confirmation.
// Falls back to opening the file in a new tab if clipboard API is blocked.
const CopyLlmsTxtButton = ({ className = '', label = 'Copy llms.txt' } = {}) => {
  const [state, setState] = React.useState('idle');
  const onClick = async () => {
    try {
      const r = await fetch('../llms.txt', { cache: 'no-cache' });
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      const text = await r.text();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        setState('copied');
        setTimeout(() => setState('idle'), 2200);
      } else {
        window.open('../llms.txt', '_blank', 'noopener,noreferrer');
        setState('opened');
        setTimeout(() => setState('idle'), 2200);
      }
    } catch (e) {
      window.open('llms.txt', '_blank', 'noopener,noreferrer');
      setState('opened');
      setTimeout(() => setState('idle'), 2200);
    }
  };
  const flash =
    state === 'copied' ? '✓ copied — paste into your agent' :
    state === 'opened' ? '↗ opened in new tab' :
    label;
  return (
    <button onClick={onClick}
      title="Copy the llms.txt site map (an LLM-friendly index pointing at SKILL.md + every doc). Paste it into your agent's context."
      className={`font-mono text-xs text-bene-text hover:bg-bene-text/10 transition-colors border border-bene-text rounded-sm px-3 py-2 whitespace-nowrap ${className}`}>
      {flash}
    </button>
  );
};

// ─── 00 · Hero ──────────────────────────────────────────────────────
const Hero = () => (
  <section className="min-h-screen flex flex-col justify-center pt-24 pb-16">
    <div className="max-w-6xl mx-auto px-6 w-full">
      <h1 className="font-display text-5xl md:text-7xl font-semibold tracking-tight leading-[1.1] mb-6 max-w-4xl">
        你的 eval 给上一个 prompt 打了分。<br />
        <span className="text-bene-muted">它照样上线了。</span>
      </h1>
      <p className="text-xl md:text-2xl text-bene-muted max-w-3xl leading-snug mb-12">
        给已经在生产里跑过 LangGraph、CrewAI、AutoGen，亲手发现「eval 跑通」跟「拦住一个 bad ship」是两码事的工程师。
      </p>
      <div className="grid md:grid-cols-2 gap-12 items-start mb-16">
        <div>
          <p className="text-lg leading-relaxed mb-6">
            事发后第二天凌晨 3 点，oncall 用 sqlite3 打开 <code className="text-bene-text">bene.db</code>，把 agent 试过的每一次 retry 的 engram 看了一遍 — 还有那道放 bad prompt 过去的 locked probe。{' '}
            <span className="text-bene-text font-medium">没有 vendor portal。没有还在转圈的 dashboard。</span>
          </p>
          <p className="text-sm text-bene-muted leading-relaxed font-mono">
            下一次上线要先过的就是那道 gate。<code className="text-bene-text">promote()</code> 在没拿到 sha256-locked probe 的 ACCEPT 之前就 raise <code className="text-bene-text">PromotionBlocked</code> — CI 在这个 exception 上停。
          </p>
        </div>
        <div className="flex flex-col gap-3">
          <Pill>30 秒：装上、跑通、grep 你 agent 的记忆</Pill>
          <Pill>一份 bene.db，不上云、不要 API key</Pill>
          <Pill>兼容 Claude Code / Cursor / Aider</Pill>
        </div>
      </div>
      <Terminal copyText="uv add bene && uv run bene init && uv run bene demo --no-ui">
        <span className="text-bene-accent">uv</span> add bene && <span className="text-bene-accent">uv</span> run bene init && <span className="text-bene-accent">uv</span> run bene demo --no-ui
        <br />
        <span className="text-bene-muted"># 整个 demo 在 1s 内跑完 — 12 个 engram、4 次 experiment run。</span>
        <br />
        <br />
        sqlite3 bene.db <span className="text-[#A3E635]">"SELECT tier, kind, substr(summary,1,60) FROM engrams ORDER BY ts DESC LIMIT 5;"</span>
      </Terminal>
      <div className="mt-8 pt-6 border-t border-bene-dim flex flex-col md:flex-row md:items-center gap-3 md:gap-6">
        <p className="text-xs text-bene-muted leading-snug">
          或者把 BENE 交给你的 agent — 一个 URL，agent 自己抓 skill 和 index，自己跑 BENE。
        </p>
        <div className="flex flex-wrap gap-2 shrink-0">
          <a href="../SKILL.md" target="_blank" rel="noopener noreferrer"
             className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors border border-bene-dim rounded-sm px-3 py-1.5 whitespace-nowrap">
            /bene/SKILL.md ↗
          </a>
          <CopyLlmsTxtButton className="text-bene-muted border-bene-dim hover:text-bene-accent !py-1.5" label="复制 llms.txt" />
        </div>
      </div>
    </div>
  </section>
);

// ─── 01 · The Gap ───────────────────────────────────────────────────
const TheGap = () => (
  <Section id="gap">
    <Kicker number="01" title="现状的 Gap" />
    <h2 className="font-display text-3xl md:text-4xl font-semibold mb-6">
      学术界已经走过去的四个生产 gap。<br />
      <span className="text-bene-muted">多数 agent stack 还没接上。</span>
    </h2>
    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 mb-16">
      <Card className="md:col-span-12 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 1：跑过 eval ≠ 拦住上线</h3>
        <p className="text-bene-muted leading-relaxed">
          一个新 prompt 或 strategy 通过了 offline eval。那个分数本身不会拒绝 ship 一个 regression — pipeline 里总有一个人或一个 deploy script 在做最后那一下决定。BENE 把这个 gate 写成代码：<code className="text-bene-text">promote()</code> 在没拿到 sha256-locked probe 的 ACCEPT 之前就 raise <code className="text-bene-text">PromotionBlocked</code>，CI 在这个 exception 上停。
        </p>
      </Card>
      <Card className="md:col-span-6 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 2：跨 agent 的记忆 + 可溯源 provenance</h3>
        <p className="text-bene-muted leading-relaxed">
          对话历史和单 agent 的 memory block 已经常见；少见的是 typed、provenance-linked、分 5 tier 的 engram — 三个月后另一个 agent grep 进来还能信。BENE 默认把每一轮都写成这种 engram。
        </p>
      </Card>
      <Card className="md:col-span-6 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 3：autonomy 不该是 YAML 一行开关</h3>
        <p className="text-bene-muted leading-relaxed">
          多数 autonomy flag 住在 config 文件里 — 易设、易忘。BENE 把四个 signal 合成 [0,1] 的 trust score；想拿 L4，必须 <code className="text-bene-text">granted_by='human:&lt;name&gt;'</code>，否则 API 直接 raise。提权路径是 observable，不是 declarative。
        </p>
      </Card>
      <Card className="md:col-span-12 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 4：source of truth 是磁盘上的一个文件</h3>
        <p className="text-bene-muted leading-relaxed">
          凌晨 3 点出 incident，你想看到底上线的是哪个 prompt — 你要的是磁盘上一个文件，不是一个还在转圈的 dashboard。BENE 的 <code className="text-bene-text">bene.db</code> 就是这个文件：cp、rsync、diff、用 sqlite3 直接打开都行。
        </p>
      </Card>
    </div>
    <p className="font-mono text-sm text-bene-text border-l-2 border-bene-accent pl-4">
      四个 production primitive，落在磁盘上，跟你已经在跑的那一套可以组合。
    </p>
  </Section>
);

// ─── 02 · The Contract ──────────────────────────────────────────────
const Contract = () => {
  const inv = [
    { n: '1', t: 'agent 之间不会意外共享 state', d: '每个 agent 拥有一份 SQLite-backed 虚拟文件系统，可以 diff、可以 restore。跨 agent 的 read 必须显式声明；跨 agent 的 decision 走 SharedLog（intent → vote → decide）。Isolation 是结构上的 — 不用维护 ACL。' },
    { n: '2', t: '下一个 agent 走进来就能 grep 上一个学到了什么', d: '每次 run 落下 5 tier 的 typed engram：trace 0、episodic 1、semantic 2、procedural 3、strategic 4。Promote 一律不动 source。Provenance 必填。' },
    { n: '3', t: '一个 bad prompt 不能只靠跑过 eval 就上线', d: "任何想 evolve 的东西，先过 sha256-locked falsifiable probe。改 spec 就 refuse。一个 baseline 都打不死的 gate 注册为 VOID。Verdict 本身也是 engram，三个月后还能再读。" },
    { n: '4', t: 'L4 是唯一一个由人按名字 grant 的层级', d: "四个 signal 合成 [0,1] 的 composite。要拿 L4，必须 granted_by='human:<name>'，不然 API raise。没有 self-promotion。没有 YAML 开关。" },
  ];
  return (
    <Section id="contract">
      <Kicker number="02" title="Contract — 四个不变量" />
      <h2 className="font-display text-3xl md:text-4xl font-semibold mb-6">四条 harness 不肯让步的 invariant</h2>
      <p className="text-lg text-bene-muted max-w-3xl leading-relaxed mb-16">
        在加任何 feature 之前，BENE 对四件事先许诺 — 对每个 agent、每次 run、每个 promotion candidate、每次 L4 grant。
      </p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16">
        {inv.map((i) => (
          <Card key={i.n} className="h-full flex flex-col">
            <div className="flex items-center gap-4 mb-4">
              <span className="font-mono text-bene-dim text-4xl leading-none">{i.n}</span>
              <h3 className="font-mono text-bene-text">{i.t}</h3>
            </div>
            <p className="text-bene-muted leading-relaxed flex-1">{i.d}</p>
          </Card>
        ))}
      </div>
      <p className="font-mono text-sm text-bene-text border-l-2 border-bene-accent pl-4">剩下的，都是管道。</p>
    </Section>
  );
};

// ─── 03 · Plays well with your toolbox ──────────────────────────────
const Comparison = () => {
  const recipes = [
    { n: 'LangGraph',     r: '把 node 的输出包成 engram；下一次 graph run 之前，candidate prompt 必过 promote() gate。' },
    { n: 'CrewAI',        r: 'crew.kickoff() → engram batch；新的 role config 只在 probe ACCEPT 之后才 promote。' },
    { n: 'AutoGen',       r: 'on_message hook → engram；跨 agent 的 decision 走 SharedLog；probe 守住 conversational hand-off。' },
    { n: 'smolagents',    r: '你的 loop 不动；engram + probe 在底下跑，agent body 不用改。' },
    { n: 'DSPy',          r: '把 DSPy.compile 的 output 注册为 candidate；五行 probe 对你的 metric 跑；promote() 直接替代 deploy.py。' },
    { n: 'Letta',         r: '把 Letta memory block 映射成 tier-2 engram；跨 agent 复用走 probe + gate。' },
  ];
  const adds = [
    '上线前过 hash-locked kill gate',
    '5 tier 的 typed engram ladder，每次升 tier 都过 probe gate',
    'Per-agent VFS isolation；跨 agent 的 read 始终显式',
    'SharedLog 跑 intent → vote → decide 做跨 agent decision',
    'L0–L4 的 trust ladder（四 signal 合成 [0,1] composite）',
    'Breeding program：genome + Pareto front + gated promote()',
    '一份本地 SQLite 文件做 audit substrate',
  ];
  return (
    <Section id="comparison">
      <Kicker number="03" title="跟你已有的工具盒兼容" />
      <h2 className="font-display text-3xl md:text-4xl font-semibold mb-6">你的 crew 留着。下面加一层 substrate。</h2>
      <p className="text-lg text-bene-muted max-w-3xl leading-relaxed mb-12">
        你已经在跑 LangGraph、CrewAI，或者其他刚好适合你团队的某个东西。留着。BENE 走到那一层 orchestration 下面 — 同一份 graph，同一队 agent，同一组 provider — 然后把 engram、gate、trust signal 写在你这次 run 的旁边。
      </p>
      <div className="border border-bene-dim bg-bene-surface p-6 mb-16">
        <h3 className="font-mono text-bene-accent text-sm mb-4">Substrate 给你这些</h3>
        <ul className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2 font-mono text-sm text-bene-text">
          {adds.map((a, i) => (
            <li key={i} className="flex gap-3"><span className="text-bene-accent">+</span>{a}</li>
          ))}
        </ul>
      </div>
      <h3 className="font-mono text-bene-accent text-sm mb-6 tracking-widest uppercase">集成 recipe</h3>
      <div className="border border-bene-dim bg-bene-surface mb-16">
        {recipes.map((r, i) => (

function App() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('bene-theme') || 'dark'; } catch (e) { return 'dark'; }
  });
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('bene-theme', theme); } catch (e) {}
  }, [theme]);
  return (
    <div className="min-h-screen w-full bg-bene-bg text-bene-text font-sans selection:bg-bene-accent/30 selection:text-bene-accent overflow-x-hidden">
      <Nav theme={theme} setTheme={setTheme} />

        <Contract />
        <Comparison />
        <Proof />
        <Recipes />
        <Architecture />
        <Limits />
        <Lore />
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
