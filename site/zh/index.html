const Terminal = ({ children, caption, copyText }) => {

        setTimeout(() => setCopied(false), 2000);

};

// ─── Copy-llms.txt button ───────────────────────────────────────────
// Fetches /bene/llms.txt, copies to the clipboard, flashes a confirmation.
// Falls back to opening the file in a new tab if clipboard API is blocked.
const CopyLlmsTxtButton = ({ className = '', label = 'Copy llms.txt' } = {}) => {
  const [state, setState] = React.useState('idle');
  const onClick = async () => {
    try {
      const r = await fetch('../llms.txt', { cache: 'no-cache' });
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      const text = await r.text();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        setState('copied');
        setTimeout(() => setState('idle'), 2200);
      } else {
        window.open('../llms.txt', '_blank', 'noopener,noreferrer');
        setState('opened');
        setTimeout(() => setState('idle'), 2200);
      }
    } catch (e) {
      window.open('llms.txt', '_blank', 'noopener,noreferrer');
      setState('opened');
      setTimeout(() => setState('idle'), 2200);
    }
  };
  const flash =
    state === 'copied' ? '✓ copied — paste into your agent' :
    state === 'opened' ? '↗ opened in new tab' :
    label;
  return (
    <button onClick={onClick}
      title="Copy the llms.txt site map (an LLM-friendly index pointing at SKILL.md + every doc). Paste it into your agent's context."
      className={`font-mono text-xs text-bene-text hover:bg-bene-text/10 transition-colors border border-bene-text rounded-sm px-3 py-2 whitespace-nowrap ${className}`}>
      {flash}
    </button>
  );
};

const TheGap = () => (

      </Card>
      <Card className="md:col-span-6 h-full">
        <h3 className="font-mono text-bene-accent mb-4">卡点 2：跨 agent 的记忆，得带 provenance「溯源」</h3>

  if (kind === 'litany') return wrap(<>

  return null;
};
