<script type="text/babel" data-presets="react">

// ─── Factory-grammar helpers ────────────────────────────────────────
// Section gains an optional `inverted` flag — when true, the section paints
// warm-ink (#1F1D1C) on cream — same light↔dark rhythm factory.ai uses
// between segments. Borders are now soft (rgb(var(--dim))) not stark.
const Section = ({ id, children, className = '', inverted = false }) => (
  <section id={id} className={`py-16 md:py-20 lg:py-28 xl:py-32 ${inverted ? 'section-inverted' : ''} ${className}`}>

// Factory kicker: <num> · <rule> · <UPPERCASE TRACKED LABEL>
// 11px Geist Mono, 0.18em tracking — the signature micro-typography of the
// reference design. Orange num + cream/ink rule + muted label.
const Kicker = ({ number, title }) => (
  <div className="flex items-center gap-4 mb-12">
    <span className="font-mono text-bene-accent text-[11px] tracking-[0.15em]">{number}</span>
    <div className="h-px bg-bene-dim flex-1" />
    <span className="font-mono text-bene-muted text-[11px] tracking-[0.18em] uppercase">{title}</span>

);

// Card: flat, crisp, factory-grade — small radius (6px), 1px soft divider,
// no glow shadow. Inner padding 28px (closer to 32 than 24 for breathing room).
const Card = ({ children, className = '' }) => (
  <div className={`bg-bene-surface border border-bene-dim p-7 rounded-md ${className}`}>{children}</div>
);

const Terminal = ({ children, caption, copyText }) => {
  const [copied, setCopied] = React.useState(false);
  const onCopy = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(copyText);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }
    } catch (e) { /* swallow */ }
  };
  return (
    <div className="flex flex-col gap-3">
      <div className="bg-[rgb(var(--term))] border border-bene-dim rounded-sm overflow-hidden">
        <div className="flex items-center justify-between px-4 py-2.5 border-b border-bene-dim bg-bene-surface">
          <div className="flex gap-2">
            <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
            <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
            <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
          </div>
          {copyText && (
            <button onClick={onCopy} className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors"
              title="Copy install command to clipboard">
              {copied ? '✓ copied' : 'copy install ↗'}
            </button>
          )}
        </div>
        <div className="p-5 overflow-x-auto">
          <pre className="font-mono text-[13px] text-bene-text leading-relaxed"><code>{children}</code></pre>
        </div>
      </div>
      {caption && <p className="font-mono text-xs text-bene-muted">{caption}</p>}
    </div>
  );
};

            <path transform="translate(320,0) scale(-1,1)" d="M 38 26 H 112 Q 160 26 160 64 Q 160 100 112 100 H 38 Z M 58 42 H 112 Q 140 42 140 64 Q 140 84 112 84 H 58 Z M 38 100 H 112 Q 160 100 160 136 Q 160 174 112 174 H 38 Z M 58 116 H 112 Q 140 116 140 136 Q 140 158 112 158 H 58 Z"/>

          <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}

      </div>

  );
};

// ─── Copy-llms.txt button ───────────────────────────────────────────
// Fetches /bene/llms.txt, copies to the clipboard, flashes a confirmation.
// Falls back to opening the file in a new tab if clipboard API is blocked.
const CopyLlmsTxtButton = ({ className = '', label = 'Copy llms.txt' } = {}) => {
  const [state, setState] = React.useState('idle');
  const onClick = async () => {
    try {
      const r = await fetch('llms.txt', { cache: 'no-cache' });
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      const text = await r.text();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        setState('copied');
        setTimeout(() => setState('idle'), 2200);
      } else {
        window.open('llms.txt', '_blank', 'noopener,noreferrer');
        setState('opened');
        setTimeout(() => setState('idle'), 2200);
      }
    } catch (e) {
      window.open('llms.txt', '_blank', 'noopener,noreferrer');
      setState('opened');
      setTimeout(() => setState('idle'), 2200);
    }
  };
  const flash =
    state === 'copied' ? '✓ copied — paste into your agent' :
    state === 'opened' ? '↗ opened in new tab' :
    label;
  return (
    <button onClick={onClick}
      title="Copy the llms.txt site map (an LLM-friendly index pointing at SKILL.md + every doc). Paste it into your agent's context."
      className={`font-mono text-xs text-bene-text hover:bg-bene-text/10 transition-colors border border-bene-text rounded-sm px-3 py-2 whitespace-nowrap ${className}`}>
      {flash}
    </button>
  );
};

// ─── 00 · Hero ──────────────────────────────────────────────────────

// ─── 01 · The Gap ───────────────────────────────────────────────────
const TheGap = () => (
  <Section id="gap">

        </p>

      </Card>

        <p className="text-bene-muted leading-relaxed">

      </Card>
      <Card className="md:col-span-6 h-full">

        <p className="text-bene-muted leading-relaxed">

      </Card>
    </div>
    <p className="font-mono text-sm text-bene-text border-l-2 border-bene-accent pl-4">
      Four production primitives, on disk, composable with whatever you already run.
    </p>
  </Section>
);

// ─── 02 · The Contract ──────────────────────────────────────────────
const Contract = () => {
  const inv = [

      <path d="M 14 22 L 11 8 M 14 22 L 17 8" />

  </>);
  if (kind === 'litany') return wrap(<>
    <path {...stroke} d="M 8 32 L 28 32" />

  </>);

};
