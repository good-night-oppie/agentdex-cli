<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>BENE — multi-agent harness with hash-locked kill gates</title>

<link rel="icon" type="image/svg+xml" href="assets/bene-logo.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bene: {
          bg: 'rgb(var(--bg) / <alpha-value>)',
          surface: 'rgb(var(--surface) / <alpha-value>)',
          accent: 'rgb(var(--accent) / <alpha-value>)',
          text: 'rgb(var(--text) / <alpha-value>)',
          dim: 'rgb(var(--dim) / <alpha-value>)',
          med: 'rgb(var(--med) / <alpha-value>)',
          muted: 'rgb(var(--muted) / <alpha-value>)',
        },
      },
      fontFamily: {
        sans: ['Inter', 'sans-serif'],
        display: ['"Space Grotesk"', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'monospace'],
      },

  },
}

<style>
:root, :root[data-theme="dark"] {
  --bg: 10 10 10;       /* #0A0A0A */
  --surface: 14 14 14;  /* #0E0E0E */
  --accent: 255 92 36;  /* #FF5C24 */
  --text: 237 237 237;  /* #EDEDED */
  --dim: 26 26 26;      /* #1A1A1A */
  --med: 34 34 34;      /* #222222 */
  --muted: 136 136 136; /* #888888 */
  --term: 5 5 5;        /* terminal background */
}
:root[data-theme="light"] {
  --bg: 250 250 250;    /* #FAFAFA */
  --surface: 245 245 245;/* #F5F5F5 */
  --accent: 194 84 27;  /* #C2541B (AA on light) */
  --text: 26 26 26;     /* #1A1A1A */
  --dim: 229 229 229;   /* #E5E5E5 */
  --med: 204 204 204;   /* #CCCCCC */
  --muted: 102 102 102; /* #666666 */
  --term: 14 11 22;     /* terminals stay dark in both themes */
}
body { background: rgb(var(--bg)); color: rgb(var(--text)); font-family:'Inter',sans-serif; transition: background-color .15s, color .15s; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background: rgb(var(--surface)); }
::-webkit-scrollbar-thumb { background: rgb(var(--med)); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background: rgb(var(--accent)); }
.hide-scrollbar::-webkit-scrollbar { display:none; }
.hide-scrollbar { scrollbar-width:none; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─── Patagon-style helpers ──────────────────────────────────────────
const Section = ({ id, children, className = '', noBorder = false }) => (
  <section id={id} className={`py-24 ${noBorder ? '' : 'border-t border-bene-dim'} ${className}`}>
    <div className="max-w-6xl mx-auto px-6">{children}</div>
  </section>
);

const Kicker = ({ number, title }) => (
  <div className="flex items-center gap-4 mb-16">
    <span className="font-mono text-bene-accent text-sm">{number}</span>
    <div className="h-px bg-bene-dim flex-1" />
    <span className="font-mono text-bene-accent text-sm tracking-widest uppercase">{title}</span>
  </div>
);

const Card = ({ children, className = '' }) => (
  <div className={`bg-bene-surface border border-bene-dim p-8 ${className}`}>{children}</div>
);

const Terminal = ({ children, caption }) => (
  <div className="flex flex-col gap-3">
    <div className="bg-[rgb(var(--term))] border border-bene-dim rounded-sm overflow-hidden">
      <div className="flex items-center px-4 py-2.5 border-b border-bene-dim bg-bene-surface">
        <div className="flex gap-2">
          <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
          <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
          <div className="w-2.5 h-2.5 rounded-full bg-bene-med" />
        </div>
      </div>
      <div className="p-5 overflow-x-auto">
        <pre className="font-mono text-[13px] text-bene-text leading-relaxed"><code>{children}</code></pre>
      </div>
    </div>
    {caption && <p className="font-mono text-xs text-bene-muted">{caption}</p>}
  </div>
);

const Pill = ({ children }) => (
  <div className="border border-bene-dim rounded-full px-4 py-2 font-mono text-xs text-bene-muted flex items-center gap-3 w-fit">
    <div className="w-1.5 h-1.5 rounded-full bg-bene-accent" />
    {children}
  </div>
);

// ─── Nav ────────────────────────────────────────────────────────────
const Nav = ({ theme, setTheme }) => {
  const links = [
    { id: 'gap', label: '01 Gap' },
    { id: 'contract', label: '02 Contract' },
    { id: 'comparison', label: '03 Integrates' },
    { id: 'proof', label: '04 Proof' },
    { id: 'recipes', label: '05 Recipes' },
    { id: 'architecture', label: '06 Arch' },
    { id: 'limits', label: '07 Limits' },
    { id: 'lore', label: '08 Lore' },
  ];
  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  };
  return (
    <nav className="fixed top-0 left-0 right-0 z-50 bg-bene-bg/90 backdrop-blur-md border-b border-bene-dim">
      <div className="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
        <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
          <svg viewBox="0 0 320 200" className="text-bene-accent h-5 w-auto" fill="currentColor" fillRule="evenodd" aria-label="BENE">
            <path d="M 38 26 H 112 Q 160 26 160 64 Q 160 100 112 100 H 38 Z M 58 42 H 112 Q 140 42 140 64 Q 140 84 112 84 H 58 Z M 38 100 H 112 Q 160 100 160 136 Q 160 174 112 174 H 38 Z M 58 116 H 112 Q 140 116 140 136 Q 140 158 112 158 H 58 Z"/>
            <path transform="translate(320,0) scale(-1,1)" d="M 38 26 H 112 Q 160 26 160 64 Q 160 100 112 100 H 38 Z M 58 42 H 112 Q 140 42 140 64 Q 140 84 112 84 H 58 Z M 38 100 H 112 Q 160 100 160 136 Q 160 174 112 174 H 38 Z M 58 116 H 112 Q 140 116 140 136 Q 140 158 112 158 H 58 Z"/>
          </svg>
          <span className="font-display font-bold tracking-widest text-sm">BENE</span>
        </div>
        <div className="flex items-center gap-3 md:gap-6">
          <div className="hidden md:flex items-center gap-6">
            {links.map(l => (
              <button key={l.id} onClick={() => scrollTo(l.id)} className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors">{l.label}</button>
            ))}
          </div>
          <a href="docs/index.html" className="font-mono text-xs text-bene-accent hover:bg-bene-accent/10 transition-colors border border-bene-accent rounded-sm px-3 py-1">Docs ↗</a>
          <a href="SKILL.md" target="_blank" rel="noopener noreferrer" className="hidden sm:inline font-mono text-xs text-bene-text hover:text-bene-accent transition-colors" title="Drop this into your agent to make it a BENE expert (raw markdown)">SKILL.md</a>
          <a href="https://github.com/EdwardTang/bene-site" target="_blank" rel="noopener noreferrer" className="hidden sm:inline font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors">GitHub</a>
          <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
            className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors border border-bene-dim rounded-sm px-2 py-1"

};

// ─── 00 · Hero ──────────────────────────────────────────────────────
const Hero = () => (
  <section className="min-h-screen flex flex-col justify-center pt-24 pb-16">
    <div className="max-w-6xl mx-auto px-6 w-full">
      <h1 className="font-display text-5xl md:text-7xl font-semibold tracking-tight leading-[1.1] mb-6 max-w-4xl">
        Your eval scored your last prompt.<br />
        <span className="text-bene-muted">It still shipped.</span>
      </h1>
      <p className="text-xl md:text-2xl text-bene-muted max-w-3xl leading-snug mb-12">
        For builders who ran LangGraph or CrewAI in prod and learned that scoring an eval is not the same as blocking a bad ship.
      </p>
      <div className="grid md:grid-cols-2 gap-12 items-start mb-16">
        <div>
          <p className="text-lg leading-relaxed mb-6">
            BENE is a local-first multi-agent harness on one SQLite file. Memory compounds across agents as engrams the next agent can grep.{' '}
            <span className="text-bene-text font-medium">A prompt only ships if a hash-locked probe says ACCEPT.</span>
          </p>
          <p className="text-sm text-bene-muted leading-relaxed font-mono">

          </p>
        </div>
        <div className="flex flex-col gap-3">
          <Pill>30 seconds: install, smoke, grep your agent's memory</Pill>
          <Pill>one bene.db, no cloud, no keys</Pill>

        </div>
      </div>
      <Terminal>
        <span className="text-bene-accent">uv</span> add bene && <span className="text-bene-accent">uv</span> run bene init && <span className="text-bene-accent">uv</span> run bene demo --no-ui
        <br />
        <span className="text-bene-muted"># story complete in &lt;1s — 12 engrams, 4 experiment runs.</span>
        <br />
        <br />
        sqlite3 bene.db <span className="text-[#A3E635]">"SELECT tier, kind, substr(summary,1,60) FROM engrams ORDER BY ts DESC LIMIT 5;"</span>
      </Terminal>
      <div className="mt-6 flex flex-col md:flex-row md:items-center gap-3 md:gap-6">
        <p className="text-sm text-bene-muted leading-snug">
          <span className="text-bene-text font-medium">Hand BENE to your agent in one URL.</span> Your agent can fetch the full skill — gates, blacklists, recipes, schema — and run BENE itself instead of you babysitting it.
        </p>
        <a href="SKILL.md" target="_blank" rel="noopener noreferrer"
           className="font-mono text-xs text-bene-accent hover:bg-bene-accent/10 transition-colors border border-bene-accent rounded-sm px-3 py-2 whitespace-nowrap shrink-0">
          curl /bene/SKILL.md ↗
        </a>
      </div>
    </div>
  </section>
);

// ─── 01 · The Gap ───────────────────────────────────────────────────
const TheGap = () => (
  <Section id="gap">
    <Kicker number="01" title="The Gap" />
    <h2 className="font-display text-3xl md:text-4xl font-semibold mb-6">
      Four production gaps the research moved past.<br />
      <span className="text-bene-muted">Most agent stacks haven't picked them up yet.</span>
    </h2>
    <p className="text-lg text-bene-muted max-w-3xl leading-relaxed mb-16">
      None of these is a knock on any particular framework — the orchestration layer you already use probably does its job well. These are the engineering gaps the post-2024 agent-research literature has answers for, and BENE’s job is to put those answers within reach as production primitives.
    </p>
    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 mb-16">
      <Card className="md:col-span-12 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 1. Eval scoring ≠ promotion gating</h3>
        <p className="text-bene-muted leading-relaxed">
          A new prompt or strategy passes an offline eval. That score does not, by itself, refuse to ship a regression — somewhere in your pipeline a human or a deploy script makes the final call. BENE turns the gate into code: <code className="text-bene-text">promote()</code> raises <code className="text-bene-text">PromotionBlocked</code> unless a sha256-locked probe says ACCEPT, so CI halts on the exception.
        </p>
      </Card>
      <Card className="md:col-span-6 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 2. Cross-agent memory with provenance</h3>
        <p className="text-bene-muted leading-relaxed">
          Conversation history and single-agent memory blocks are common; what’s rare is typed, provenance-linked engrams on a 5-tier ladder that another agent can grep months later and trust. BENE writes every turn as that kind of engram by default.
        </p>
      </Card>
      <Card className="md:col-span-6 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 3. Autonomy as a computed signal</h3>
        <p className="text-bene-muted leading-relaxed">
          Most autonomy flags live in a config file — easy to set, easy to forget. BENE folds four signals into a [0,1] trust score, and L4 grants require <code className="text-bene-text">granted_by='human:&lt;name&gt;'</code> or the API raises. The escalation path is observable, not declarative.
        </p>
      </Card>
      <Card className="md:col-span-12 h-full">
        <h3 className="font-mono text-bene-accent mb-4">Gap 4. A local file as the source of truth</h3>
        <p className="text-bene-muted leading-relaxed">
          When an incident review at 03:00 needs the exact prompt that shipped, you want a file on your disk — not a dashboard you’re waiting on. BENE’s <code className="text-bene-text">bene.db</code> is that file: cp it, rsync it, diff it, open it with sqlite3.
        </p>
      </Card>
    </div>
    <p className="font-mono text-sm text-bene-text border-l-2 border-bene-accent pl-4">
      Four production primitives, on disk, composable with whatever you already run.
    </p>
  </Section>
);

// ─── 02 · The Contract ──────────────────────────────────────────────
const Contract = () => {
  const inv = [
    { n: '1', t: 'Isolated VFS per agent', d: 'Every agent owns a SQLite-backed virtual filesystem you can diff and restore. Cross-agent reads are explicit; cross-agent decisions ride SharedLog (intent → vote → decide). Isolation is structural, not enforced by an ACL.' },
    { n: '2', t: 'Typed engrams, never cold-start', d: 'Every run leaves typed engrams on a 5-tier ladder: trace 0, episodic 1, semantic 2, procedural 3, strategic 4. Promotion never mutates sources. Provenance is mandatory. The next agent walks in and greps what the last one learned.' },
    { n: '3', t: 'Hash-locked kill gate before promotion', d: "Anything that evolves passes a sha256-locked falsifiable probe before promotion. Tamper the spec, the probe refuses. A gate that can't kill the baseline registers as VOID, not ACCEPT. Verdicts are themselves engrams, re-readable months later." },
    { n: '4', t: 'Trust is computed, never declared', d: "Four signals fold into a [0,1] composite. L4 grants require granted_by='human:<name>' or the API raises. There is no YAML knob for self-promotion." },
  ];
  return (
    <Section id="contract">
      <Kicker number="02" title="The Contract — Four Invariants" />
      <h2 className="font-display text-3xl md:text-4xl font-semibold mb-6">Four invariants the harness will not bend on</h2>
      <p className="text-lg text-bene-muted max-w-3xl leading-relaxed mb-16">
        Before any feature, BENE commits to four things — for every agent, every run, every promotion candidate, every L4 grant.
      </p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16">
        {inv.map((i) => (
          <Card key={i.n} className="h-full flex flex-col">
            <div className="flex items-center gap-4 mb-4">
              <span className="font-mono text-bene-dim text-4xl leading-none">{i.n}</span>
              <h3 className="font-mono text-bene-text">{i.t}</h3>
            </div>
            <p className="text-bene-muted leading-relaxed flex-1">{i.d}</p>
          </Card>
        ))}
      </div>
      <p className="font-mono text-sm text-bene-text border-l-2 border-bene-accent pl-4">The rest is plumbing.</p>
    </Section>
  );
};

// ─── 03 · Plays well with your toolbox ──────────────────────────────
const Comparison = () => {
  const recipes = [
    { n: 'LangGraph',     r: 'Wrap node outputs as engrams; gate promote() on the candidate prompt before the next graph run.' },
    { n: 'CrewAI',        r: 'crew.kickoff() → engram batch; promote new role configs only when their probe ACCEPTs.' },
    { n: 'AutoGen',       r: 'on_message hook → engram; SharedLog for cross-agent decisions; probe gates conversational hand-off.' },
    { n: 'smolagents',    r: 'Thin loop unchanged; engrams + probe live underneath, no changes to the agent body.' },
    { n: 'DSPy',          r: 'Register DSPy.compile output as a candidate; 5-line probe against your metric; promote() replaces deploy.py.' },
    { n: 'Letta',         r: 'Mirror Letta memory blocks as tier-2 engrams; cross-agent reuse goes through the probe + gate.' },
  ];
  const adds = [
    'Hash-locked kill gate before promotion',
    '5-tier typed engram ladder with probe-gated tier promotion',
    'Per-agent VFS isolation + cross-agent reads stay explicit',
    'SharedLog intent → vote → decide for shared decisions',
    'Computed L0–L4 trust ladder (4 signals → [0,1] composite)',
    'Breeding program: genome + Pareto + gated promote()',
    'One local SQLite file as the audit substrate',
  ];
  return (
    <Section id="comparison">
      <Kicker number="03" title="Plays well with your toolbox" />
      <h2 className="font-display text-3xl md:text-4xl font-semibold mb-6">A production substrate, not a framework war.</h2>
      <p className="text-lg text-bene-muted max-w-3xl leading-relaxed mb-12">
        BENE’s niche is putting post-2024 agent-research primitives — engram ladder, hash-locked probes, computed trust — on one local SQLite file you can audit at 03:00. Whichever orchestration framework you already run is welcome to stay; the substrate composes underneath.
      </p>
      <div className="border border-bene-dim bg-bene-surface p-6 mb-16">
        <h3 className="font-mono text-bene-accent text-sm mb-4">What the substrate gives you</h3>
        <ul className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2 font-mono text-sm text-bene-text">
          {adds.map((a, i) => (
            <li key={i} className="flex gap-3"><span className="text-bene-accent">+</span>{a}</li>
          ))}
        </ul>
      </div>
      <h3 className="font-mono text-bene-accent text-sm mb-6 tracking-widest uppercase">Integration recipes</h3>
      <div className="border border-bene-dim bg-bene-surface mb-16">
        {recipes.map((r, i) => (
          <div key={r.n} className={'flex flex-col md:flex-row md:items-center gap-2 md:gap-6 p-4 ' + (i < recipes.length - 1 ? 'border-b border-bene-dim' : '')}>
            <div className="font-mono text-sm text-bene-accent md:w-32 shrink-0">{r.n}</div>
            <div className="text-sm text-bene-text leading-relaxed">{r.r}</div>
          </div>
        ))}
      </div>
      <div className="space-y-6">
        <p className="font-mono text-sm text-bene-text border-l-2 border-bene-accent pl-4">
          Bring your own framework. Bring your own provider. Add the production substrate; ship through one bene.db.
        </p>
        <div className="pt-8 border-t border-bene-dim flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <p className="text-xs text-bene-muted max-w-2xl">
            BENE’s job is to be the local-first substrate underneath your stack — not to score it against other tools. Receipts and limits are in the docs below.
          </p>
          <div className="flex gap-4 font-mono text-xs">
            <a href="https://github.com/EdwardTang/bene-site/blob/main/docs/design/CLAIMS-AUDIT.md" target="_blank" rel="noopener noreferrer" className="text-bene-accent hover:underline">CLAIMS-AUDIT.md</a>
            <a href="https://github.com/EdwardTang/bene-site/blob/main/docs/benchmarks/COMMUNITY-BENCH-REPORT.md" target="_blank" rel="noopener noreferrer" className="text-bene-accent hover:underline">COMMUNITY-BENCH-REPORT.md</a>
          </div>
        </div>
      </div>
    </Section>
  );
};

// ─── 04 · Proof (tabs) ──────────────────────────────────────────────
const Proof = () => {
  const [a, setA] = useState(0);
  const tabs = [
    { l: 'Tab 1: Install + smoke', c: 'First value: zero keys, zero cloud.',
      r: (<><span>$ uv add bene && uv run bene init && uv run bene demo --no-ui</span><br/><span className="text-bene-muted">[trace]</span> initializing harness...<br/><span className="text-bene-accent">[probe]</span> running baseline evaluation...<br/><span className="text-bene-muted">[evolve]</span> generating candidate strategies...<br/><span className="text-bene-muted">[trace]</span> complete. 12 engrams written.</>) },
    { l: 'Tab 2: Planner + Executor', c: 'Two agents, one bene.db. Intent → vote → decide is the only path between shared decisions.',
      r: (<><span className="text-bene-accent">from</span> bene <span className="text-bene-accent">import</span> Bene, Agent<br/><br/>harness = Bene()<br/>planner = Agent(name=<span className="text-[#A3E635]">'planner'</span>)<br/>executor = Agent(name=<span className="text-[#A3E635]">'executor'</span>)<br/><br/><span className="text-bene-muted"># Write to VFS</span><br/>planner.vfs.write(<span className="text-[#A3E635]">'/plan.md'</span>, <span className="text-[#A3E635]">'1. init\n2. run'</span>)<br/><br/><span className="text-bene-muted"># Intent → Vote → Decide</span><br/>harness.log.propose(intent=<span className="text-[#A3E635]">'execute_plan'</span>)</>) },
    { l: 'Tab 3: Grep the engrams', c: "Your agent's memory is a table. No vendor API between you and what shipped.",
      r: (<>$ sqlite3 bene.db <span className="text-[#A3E635]">"SELECT tier, kind, substr(summary,1,60) FROM engrams ORDER BY ts DESC LIMIT 5;"</span><br/><br/>4|strategy|Use exponential backoff for rate limits...<br/>3|procedural|Retry logic implementation details...<br/>2|semantic|Anthropic API rate limit characteristics...<br/>1|episodic|Failed request to claude-3-opus at 14:32...<br/>0|trace|HTTP 429 Too Many Requests...</>) },
    { l: 'Tab 4: Probe ACCEPT vs REJECT', c: "Tamper the spec, LockTamperError. A gate that can't kill the baseline registers VOID, not ACCEPT.",
      r: (<><span className="text-bene-accent">def</span> <span className="text-[#60A5FA]">test_candidate</span>(eval_run):<br/>&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-bene-accent">if</span> eval_run.quality &lt; <span className="text-[#FBBF24]">0.70</span>:<br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="text-bene-accent">raise</span> PromotionBlocked(<span className="text-[#A3E635]">'Quality regression'</span>)<br/><br/><span className="text-bene-muted"># Run 1: quality=0.71</span><br/><span className="text-[#A3E635]">ACCEPT</span>: Candidate promoted to tier 4.<br/><br/><span className="text-bene-muted"># Run 2: quality=0.62</span><br/><span className="text-bene-accent">PromotionBlocked</span>: Quality regression. Promotion aborted.</>) },
  ];
  return (
    <Section id="proof">
      <Kicker number="04" title="30-second proof" />
