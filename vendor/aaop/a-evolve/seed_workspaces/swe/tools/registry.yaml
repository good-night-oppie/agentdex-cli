tools:
  - name: bash
    description: Execute a bash command inside the SWE-bench Docker container.
    file: bash.py
  - name: text_editor
    description: Edit files with structured commands (view, create, str_replace, insert, undo_edit). More reliable than sed for code edits.
    file: text_editor.py
  - name: python_exec
    description: Execute Python code directly. Each call is independent (no state persists). Use print() to see output.
    file: python_exec.py
  - name: submit
    description: Submit your solution and end the task.
    file: submit.py
