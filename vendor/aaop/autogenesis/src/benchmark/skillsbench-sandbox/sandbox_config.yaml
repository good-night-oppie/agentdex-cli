# Server bind settings
host: 0.0.0.0
port: 8080

# SkillsBench repo root (can be relative to this yaml file)
repo_root: ./skillsbench
default_dataset: tasks

# Runtime defaults for sandbox manager
default_step_timeout_sec: 60
default_eval_timeout_sec: 1800
default_workdir: /root
max_timeout_sec: 7200
max_output_chars_default: 120000
run_dir_base: ./tmp
