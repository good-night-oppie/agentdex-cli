_base: "../base.yaml"
_name: "gpt54-wo-adb"
_description: "GPT-5.4 baseline without Agent Debugger (ablation of exp-simple-code-gpt54)"
_tags: ["model-comparison", "gpt54", "ablation", "wo-adb"]

# 使用 simple code agent（与 base 的 code_agent 目录区分）
# source_config_dir 支持相对（相对 AHE 根目录）或绝对路径
source_config_dir: "agents/code_agent_simple"
agent_config_filename: "code_agent.yaml"

# 数据源（详见 base.yaml 注释与 README「数据集配置」）
dataset: "terminal-bench@2.0"

# 覆盖 base 中 harbor.k（每个 task 的 rollout 次数）
harbor:
  k: 2
  n_concurrent: 64

llm:
    api_key: "${GPT54_LLM_API_KEY}"
    base_url: "${GPT54_LLM_BASE_URL}"
    model: "gpt-5.4"

# === 消融点：关闭 Agent Debugger ===
agent_debugger:
  enabled: false

code_agent_patch:
  tool_call_mode: openai
  llm_config:
    api_type: openai_responses
    reasoning:
      effort: "high"
      summary: "detailed"

evolve_agent:
  tool_call_mode: openai
  llm_config:
    api_key: "${GPT54_LLM_API_KEY}"
    base_url: "${GPT54_LLM_BASE_URL}"
    model: "gpt-5.4"
    api_type: openai_responses
    reasoning:
      effort: "xhigh"
      summary: "detailed"

explore_agent_patch:
  tool_call_mode: openai
  llm_config:
    api_type: openai_responses
    reasoning:
      effort: "xhigh"
      summary: "detailed"
