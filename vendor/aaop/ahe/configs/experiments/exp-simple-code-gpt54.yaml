_base: "../base.yaml"
_name: "gpt54"
_description: "GPT-5.4，走new api"
_tags: ["model-comparison", "gpt54"]

# 使用 simple code agent（与 base 的 code_agent 目录区分）
# source_config_dir 支持相对（相对 AHE 根目录）或绝对路径
source_config_dir: "agents/code_agent_simple"
agent_config_filename: "code_agent.yaml"

# 覆盖 base 中 harbor.k（每个 task 的 rollout 次数）
harbor:
  k: 2
  n_concurrent: 96

llm:
    api_key: "${GPT54_LLM_API_KEY}"
    base_url: "${GPT54_LLM_BASE_URL}"
    model: "gpt-5.4"

code_agent_patch:
  tool_call_mode: openai
  llm_config:
    api_type: openai_responses
    reasoning:
      effort: "high"
      summary: "detailed"

evolve_agent:
  tool_call_mode: openai
  llm_config:
    api_key: "${GPT54_LLM_API_KEY}"
    base_url: "${GPT54_LLM_BASE_URL}"
    model: "gpt-5.4"
    api_type: openai_responses
    reasoning:
      effort: "xhigh"
      summary: "detailed"

explore_agent_patch:
  tool_call_mode: openai
  llm_config:
    api_type: openai_responses
    reasoning:
      effort: "xhigh"
      summary: "detailed"
