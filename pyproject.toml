[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdex-cli"
version = "0.1.0"
description = "Hermes main-agent stack: long-lived CLI bridges + sub-agent registry + routing plugin"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110",
  "pydantic>=2.0",
  "pyyaml>=6.0",
]

[project.scripts]
adx-claude-bridge = "bridges.claude_bridge:main"
adx-codex-bridge  = "bridges.codex_bridge:main"
adx-gemini-bridge = "bridges.gemini_bridge:main"

[tool.hatch.build.targets.wheel]
packages = ["bridges", "plugin", "registry", "tools"]
