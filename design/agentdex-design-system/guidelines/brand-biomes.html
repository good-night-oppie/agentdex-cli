<!-- @dsCard group="Brand" viewport="700x150" name="Biome backgrounds 生态背景" subtitle="Patagonia earth anchors — the battle stadium gradients (always dark)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-mono); padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .biome { height: 104px; border-radius: var(--r-lg); border: 1px solid var(--line); position: relative; overflow: hidden; display: grid; place-items: end start; padding: 10px; }
  .biome::after { content:''; position:absolute; inset:0; background-image: radial-gradient(1px 1px at 20% 25%, rgba(255,255,255,.4), transparent), radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,.3), transparent), radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,.35), transparent); }
  .lbl { position: relative; z-index: 1; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: rgba(232,237,245,.75); }
</style>
</head>
<body>
  <div class="biome" style="background:var(--biome-forest)"><span class="lbl">Forest 森林</span></div>
  <div class="biome" style="background:var(--biome-volcanic)"><span class="lbl">Volcanic 火山</span></div>
  <div class="biome" style="background:var(--biome-cave)"><span class="lbl">Cave 洞窟</span></div>
</body>
</html>
