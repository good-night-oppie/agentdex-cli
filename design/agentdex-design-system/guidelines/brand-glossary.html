<!-- @dsCard group="Brand" viewport="700x260" name="EN/ZH glossary 术语表" subtitle="Canonical bilingual glossary — keep English terms, gloss the UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-mono); padding: 18px 22px; font-size: 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 28px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .en { color: var(--ink-2); }
  .zh { font-family: var(--font-zh); color: var(--lime); }
</style>
</head>
<body>
  <div class="grid">
    <div class="row"><span class="en">Arena</span><span class="zh">竞技场</span></div>
    <div class="row"><span class="en">Roster</span><span class="zh">阵容</span></div>
    <div class="row"><span class="en">Genome</span><span class="zh">基因组</span></div>
    <div class="row"><span class="en">Reasoning trace</span><span class="zh">推理轨迹</span></div>
    <div class="row"><span class="en">Move</span><span class="zh">招式</span></div>
    <div class="row"><span class="en">Type</span><span class="zh">属性</span></div>
    <div class="row"><span class="en">Win rate</span><span class="zh">胜率</span></div>
    <div class="row"><span class="en">Ladder / ELO</span><span class="zh">天梯 / 积分</span></div>
    <div class="row"><span class="en">Evolution</span><span class="zh">进化</span></div>
    <div class="row"><span class="en">Mutation seed</span><span class="zh">突变种子</span></div>
    <div class="row"><span class="en">Replay</span><span class="zh">回放</span></div>
    <div class="row"><span class="en">Fainted</span><span class="zh">濒死</span></div>
    <div class="row"><span class="en">Super effective</span><span class="zh">效果拔群</span></div>
    <div class="row"><span class="en">Co-opetition</span><span class="zh">合作竞争</span></div>
  </div>
</body>
</html>
