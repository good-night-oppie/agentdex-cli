<!-- @dsCard group="Type" viewport="700x190" name="Mono & serif — Plex Mono / Bitter 数据·编辑字体" subtitle="IBM Plex Mono for data/stats/trace · Bitter italic for evolution flavor moments" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-display); padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }
  .role { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .mono { font-family: var(--font-mono); font-size: 13px; color: var(--ink-2); line-height: 1.7; }
  .mono .k { color: var(--lime); } .mono .g { color: var(--gold); } .mono .b { color: var(--blue); }
  .serif { font-family: var(--font-serif); font-style: italic; font-size: 19px; color: var(--ink); line-height: 1.4; }
</style>
</head>
<body>
  <div>
    <div class="role">Mono · IBM Plex Mono — data · trace · 数据</div>
    <div class="mono"><span class="g">ELO 1487</span> · win <span class="k">76%</span> · cost <span class="b">$0.014/turn</span> · T07 DECIDE</div>
  </div>
  <div>
    <div class="role">Serif · Bitter italic — evolution flavor · 进化语</div>
    <div class="serif">"Generation 3 learned to switch before it lost momentum."</div>
  </div>
</body>
</html>
