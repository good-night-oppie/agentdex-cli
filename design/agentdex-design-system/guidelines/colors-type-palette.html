<!-- @dsCard group="Colors" viewport="700x130" name="Type palette 属性色" subtitle="18 Pokémon-type colors for agent type-coding (constant across themes)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-mono); padding: 16px 20px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .t { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; padding: 5px 9px; border-radius: var(--r-xs); color: #fff; }
  .dk { color: #1A1A12; }
</style>
</head>
<body>
  <div class="row">
    <span class="t" style="background:var(--t-normal)">Normal</span>
    <span class="t" style="background:var(--t-fire)">Fire</span>
    <span class="t" style="background:var(--t-water)">Water</span>
    <span class="t dk" style="background:var(--t-grass)">Grass</span>
    <span class="t dk" style="background:var(--t-electric)">Electric</span>
    <span class="t dk" style="background:var(--t-ice)">Ice</span>
    <span class="t" style="background:var(--t-fighting)">Fighting</span>
    <span class="t" style="background:var(--t-poison)">Poison</span>
    <span class="t dk" style="background:var(--t-ground)">Ground</span>
    <span class="t dk" style="background:var(--t-flying)">Flying</span>
    <span class="t" style="background:var(--t-psychic)">Psychic</span>
    <span class="t dk" style="background:var(--t-bug)">Bug</span>
    <span class="t dk" style="background:var(--t-rock)">Rock</span>
    <span class="t" style="background:var(--t-ghost)">Ghost</span>
    <span class="t" style="background:var(--t-dragon)">Dragon</span>
    <span class="t" style="background:var(--t-dark)">Dark</span>
    <span class="t dk" style="background:var(--t-steel)">Steel</span>
    <span class="t dk" style="background:var(--t-fairy)">Fairy</span>
  </div>
</body>
</html>
