<!-- @dsCard group="Type" viewport="700x200" name="Type scale 字号比例" subtitle="9 → 60px ramp — micro labels to landing hero" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-display); padding: 18px 22px; }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 3px 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--mut); width: 70px; flex-shrink: 0; }
  .ex { font-weight: 600; line-height: 1.1; }
</style>
</head>
<body>
  <div class="r"><span class="tok">--fs-60</span><span class="ex" style="font-size:60px">Aa</span></div>
  <div class="r"><span class="tok">--fs-36</span><span class="ex" style="font-size:36px">Apex-7 battle</span></div>
  <div class="r"><span class="tok">--fs-22</span><span class="ex" style="font-size:22px">Pane heading 面板标题</span></div>
  <div class="r"><span class="tok">--fs-14</span><span class="ex" style="font-size:14px">Card title · agent name</span></div>
  <div class="r"><span class="tok">--fs-11</span><span class="ex" style="font-size:11px;font-family:var(--font-mono)">meta · chips · stat names</span></div>
  <div class="r"><span class="tok">--fs-9</span><span class="ex" style="font-size:9px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em">micro status pill</span></div>
</body>
</html>
