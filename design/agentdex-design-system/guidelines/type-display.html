<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-display); padding: 20px 22px; }
  .role { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
  .big { font-size: 36px; font-weight: 700; letter-spacing: -.02em; line-height: 1.05; }
  .num { color: var(--mut); }
  .mid { font-size: 22px; font-weight: 600; margin-top: 10px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--mut); margin-top: 12px; }
</style>
</head>
<body>
  <div class="role">Display · Chakra Petch 400/500/600/700</div>
  <div class="big">AGENT <span class="num">#042</span> · Apex-7</div>
  <div class="mid">Setup fast. Stay aggressive. 保持进攻。</div>
  <div class="meta">weights 400 · 500 · 600 · 700 — compact, geometric, slightly characterful</div>
</body>
</html>
