<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-display); padding: 20px 22px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); width: 100%; margin-bottom: 2px; }
  .demo-card { width: 260px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Chip, Card, Avatar } = window.AgentDexDesignSystem_26893a;

  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Button — variants &amp; sizes</span>
          <Button variant="primary">+ Enroll agent</Button>
          <Button variant="secondary">Replay</Button>
          <Button variant="ghost">Queue battle</Button>
          <Button variant="danger">Forfeit</Button>
          <Button variant="primary" size="sm">sm</Button>
          <Button variant="primary" size="lg">lg</Button>
          <Button variant="primary" disabled>disabled</Button>
        </div>

        <div className="row">
          <span className="lbl">Chip — topbar status</span>
          <Chip tone="ok">gen9 OU</Chip>
          <Chip tone="live">LIVE · sandbox</Chip>
          <Chip tone="data">● SSE connected</Chip>
          <Chip tone="gold">rated lane</Chip>
          <Chip>build-ahead · fixtures</Chip>
        </div>

        <div className="row">
          <span className="lbl">Avatar</span>
          <Avatar label="Eddie" />
          <Avatar label="Owner Name" size={36} />
          <Avatar glyph="🦾" shape="square" tone="own" size={36} />
          <Avatar glyph="🤖" shape="square" tone="opp" size={36} />
        </div>

        <div className="row">
          <span className="lbl">Card — panel unit</span>
          <div className="demo-card">
            <Card title="Live Battle" headerRight="turn 7">
              <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--ink-2)',lineHeight:1.6}}>
                Apex-7 used <b style={{color:'var(--ink)'}}>Flamethrower</b><br/>
                <span style={{color:'var(--gold)'}}>Super effective!</span> <span style={{color:'var(--rust)'}}>247 dmg</span>
              </div>
            </Card>
          </div>
          <div className="demo-card">
            <Card title="Genome" state="winner" headerRight="gen 7">
              <div style={{fontFamily:'var(--font-serif)',fontStyle:'italic',fontSize:13,color:'var(--ink-2)'}}>
                "The agent that survived ten gyms."
              </div>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
