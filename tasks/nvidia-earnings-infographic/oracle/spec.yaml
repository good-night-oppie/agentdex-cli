# Oracle spec — NVIDIA Q3 FY2026 earnings infographic task.
#
# Hard claims = numeric/boolean checks with exact or tolerance match.
# Soft claims via LLM judge against chart_sanity.md rubric.
# All claims must cite source via `source: <file>:<line>` annotation
# (provenance_required at bottom).
#
# Provenance: hand-authored 2026-06-08, aligned to live Q3 FY2026 numbers
# 2026-06-09 via PR #9 (MOCK-DATA spec-align follow-up to PR #8).
# Source bundle: sources/*.md, BLAKE3 frozen in tasks/.../bundle.yaml.
#
# Top-level keys are FLAT (not nested under `hard_claims:`) so phase-3 AC3 grep
# regex hits them directly: revenue_total / gross_margin_pct / data_center_revenue
# / guidance_next_quarter / net_income / chart_sanity_rubric / provenance_required.

version: 1
task_id: nvidia-earnings-infographic-q3-fy2026

revenue_total:
  type: dollar_string
  expected: "$57.0 billion"
  tolerance: exact
  source_hint: "nvidia-q3-fy2026-press-release.md"

gross_margin_pct:
  type: percent
  expected: 73.4
  tolerance_pp: 0.1
  source_hint: "nvidia-q3-fy2026-press-release.md"

data_center_revenue:
  type: dollar_string
  expected: "$51.21 billion"
  tolerance: exact
  source_hint: "nvidia-q3-fy2026-press-release.md"

data_center_growth_yoy_pct:
  type: percent
  expected: 66
  tolerance_pp: 1
  source_hint: "nvidia-q3-fy2026-press-release.md"
  computation_note: "10-Q segment table: $51,210M / $30,820M - 1 ≈ 66%"

guidance_next_quarter:
  type: dollar_range_string
  expected: "$65.0 billion ± 2%"
  tolerance: exact_string_match
  source_hint: "nvidia-q3-fy2026-press-release.md"

net_income:
  type: dollar_string
  expected: "$31.91 billion"
  tolerance: exact
  source_hint: "nvidia-q3-fy2026-press-release.md"

networking_revenue:
  type: dollar_string
  expected: "$8.19 billion"
  tolerance: exact
  source_hint: "nvidia-q3-fy2026-press-release.md"
  computation_note: "Replaces inventory_qoq_change after PR #8 cascade — networking is the new headline sub-segment per CFO commentary."

china_compute_outlook_present:
  type: boolean
  expected: true
  source_hint: "Sources must reflect 'H20 sales insignificant' and/or 'zero data center compute from China in Q4 outlook'"

blackwell_ultra_mention_present:
  type: boolean
  expected: true
  source_hint: "Press release + transcript + investor deck all mention Blackwell Ultra as the lead architecture (was 'Blackwell + Rubin' pre-PR-8)"

chart_sanity_rubric:
  ref: oracle/chart_sanity.md
  judge_kind: soft
  judge_llm: claude-haiku-4.5
  scoring_range: [0.0, 1.0]
  uncertainty_threshold: 0.5
  calibration_required: true
  calibration_min_accuracy: 0.7

provenance_required:
  every_claim_cites: true
  citation_format: 'source: <file>:<line>'
  missing_citation_action: 'emit Seed(kind="provenance_required", seed_provenance="structural", confidence="high")'

m5_gate:
  hard_pass_rate_floor: 0.78
  soft_uncertainty_max: 0.5
  mutation_seed_categories_min: 2
  m5_accepts_provenance: ["structural"]
  m7_accepts_provenance: ["structural", "learned"]
