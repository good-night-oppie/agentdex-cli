[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adx-ladders"
version = "0.1.0"
description = "adx_ladders: LadderAdapter ABC + curated market registry (ADR-0015 D3/D4/D5/D6)"
requires-python = ">=3.11"
dependencies = [
  "adx-frontier",
  "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adx_ladders"]

[tool.hatch.build.targets.wheel.force-include]
"src/adx_ladders/registry.yaml" = "adx_ladders/registry.yaml"
