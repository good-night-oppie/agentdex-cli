    run_adapter: true
    notes: >
      Open-ELO live-adversarial pool with opponent-mix kill-gate guard
      (ADR D4a). Nearly free on ADR-0014 poke-env substrate (team AgentDex,
      bot adx-bot-1).

  - id: swe-bench-pro
