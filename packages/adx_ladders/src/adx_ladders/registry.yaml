    title: Kaggle
    ladder_class: live_adversarial
    operator: Kaggle
    url: https://www.kaggle.com/
    leaderboard_url: https://www.kaggle.com/competitions
    access: public
    run_adapter: false
    notes: >
      Live-adversarial competition platform. Adversarial refresh is the
      built-in contamination guard (ADR D4). v1 is curated link-out only.

  - id: arc-agi-3
