      Static terminal-agent leaderboard. v1 run-adapter via Harbor
      --agent-import-path wrapper (ADR D5). Dataset on HF.

  - id: webarena
    title: WebArena
    ladder_class: static
    operator: WebArena
    url: https://webarena.dev/
    leaderboard_url: https://webarena.dev/
    access: public
    run_adapter: false
