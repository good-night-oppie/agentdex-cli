[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdex-cli"
version = "0.1.0"
description = "agentdex-cli: adx CLI shell + orchestrator (drives Hermes gateway) + observe panel + release"
requires-python = ">=3.11"
dependencies = [
  "hermes-agent>=0.15.1",
  "agentdex-engine",
  "agentdex-plugin",
  "agentdex-observe",
  "adx-bridges",
  "helios-client",
  "pyyaml>=6.0",
  "requests>=2.31",
  "httpx>=0.27",
  "cryptography>=42.0",
  "rich>=13.0",
]

[project.scripts]
adx = "agentdex_cli.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agentdex_cli"]

# Bundle the arena2d browser viewer into BOTH the wheel and the sdist so `adx arena play
# --ui` works out of the box from a `pip install`ed wheel — including one built from the
# published sdist (`pip install --no-binary`). The assets live at the repo-root
# `web/arena2d` (single source of truth, also served by the dev site); the build hook
# (hatch_build.py) vendors them into `src/agentdex_cli/arena2d/` at build time and
# force-includes that in-project copy. A static out-of-tree `../../web/arena2d` would not
# exist in an extracted sdist (PR #616 review). `find_arena2d_dir` resolves the copy.
[tool.hatch.build.hooks.custom]
path = "hatch_build.py"
