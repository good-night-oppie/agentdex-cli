[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdex-cli"
version = "0.1.0"
description = "agentdex-cli: adx CLI shell + orchestrator (drives Hermes gateway) + observe panel + release"
requires-python = ">=3.11"
dependencies = [
  "hermes-agent>=0.15.1",
  "agentdex-engine",
  "agentdex-plugin",
  "agentdex-observe",
  "adx-bridges",
  "helios-client",
  "pyyaml>=6.0",
  "requests>=2.31",
  "httpx>=0.27",
  "cryptography>=42.0",
  "rich>=13.0",
]

[project.scripts]
adx = "agentdex_cli.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agentdex_cli"]

# Bundle the arena2d browser viewer INTO the wheel so `adx arena play --ui` works out
# of the box from a `pip install`ed wheel — the assets live at the repo-root `web/arena2d`
# (single source of truth, also served by the dev site), and hatch copies them here at
# build time as `agentdex_cli/arena2d/` (PR #614 review: packaged CLI must not require a
# separate repo checkout + ADX_ARENA2D_DIR). `find_arena2d_dir` resolves this copy.
[tool.hatch.build.targets.wheel.force-include]
"../../web/arena2d" = "agentdex_cli/arena2d"
