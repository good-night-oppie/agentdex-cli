id: langfuse.down
name: Tear down Langfuse self-host stack
description: |
  docker compose down on the bundled Langfuse stack. Volumes are KEPT so
  the next `adx langfuse up` restores the same project + traces.
when_to_use: |
  After the user has drilled down into traces and wants to free local
  resources, or before bringing up an alternate Langfuse configuration.
args_schema: {}
command:
  - adx
  - langfuse
  - down
