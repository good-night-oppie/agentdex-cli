id: langfuse.up
name: Bring up Langfuse self-host stack
description: |
  docker compose up the bundled Langfuse v3 stack (postgres + clickhouse +
  redis + minio + langfuse-web + langfuse-worker). Waits up to 180s for
  /api/public/health = 200. Persists seeded creds to ~/.adx/langfuse.env.
when_to_use: |
  When the user wants traces ingested for an Expedition and Langfuse is
  not yet running. Called automatically by `adx expedition` pre-flight
  unless --no-langfuse is set.
args_schema:
  wait:
    type: int
    default: 180
command:
  - adx
  - langfuse
  - up
  - --wait
  - "{wait}"
