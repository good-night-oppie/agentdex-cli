id: bridge.probe
name: One-turn probe through a baseline bridge
description: |
  Sends the first source file of a task as a single-turn prompt to a chosen
  bridge (claude / codex / manus / codex-web / gemini) and prints the
  response + Langfuse trace URL (or "trace disabled" when env unset).
when_to_use: |
  When the user wants to sanity-check that a baseline bridge can reach its
  subscription CLI / API endpoint before committing to a full Expedition.
args_schema:
  bridge:
    type: string
    enum: [claude, codex, manus, codex-web, gemini]
  task:
    type: string
    default: "nvidia-earnings-infographic"
  timeout:
    type: int
    default: 60
command:
  - adx
  - bridge
  - probe
  - --bridge
  - "{bridge}"
  - --task
  - "{task}"
  - --timeout
  - "{timeout}"
