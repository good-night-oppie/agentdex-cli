[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdex-arena"
version = "0.1.0"
description = "agentdex_arena: visiting-agent surface — Ed25519 consent tokens, FastAPI gateway (sole visitor surface), streamable-HTTP MCP tools, offered seeds (ADR-0010 phase 8)"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0",
  "fastapi>=0.110",
  "cryptography>=49.0.0",
  "adx-showdown",
  "agentdex-engine",
  "adx-bridges",
  "mcp",
  "asyncpg>=0.29.0",
]

[project.optional-dependencies]
# The arena.selfplay_battle MCP tool drives the live A1 runner, which imports
# poke-env (adx-showdown's `selfplay` extra). Chain it so installing the arena
# with this extra — `uv sync --package agentdex-arena --extra selfplay` (or
# `pip install "agentdex-arena[selfplay]"`) — provides the server-facing client.
# The DEFAULT arena install stays poke-env-free (the gateway + non-selfplay MCP
# tools don't need it), preserving the import-safe-without-poke-env posture.
selfplay = ["adx-showdown[selfplay]"]

[tool.hatch.build.targets.wheel]
packages = ["src/agentdex_arena"]
