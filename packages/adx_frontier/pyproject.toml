[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adx-frontier"
version = "0.1.0"
description = "adx_frontier: AgentCandidate manifest, frontier axes, and pre-run validation gate (ADR-0015 D1/D3)"
requires-python = ">=3.11"
dependencies = [
  "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adx_frontier"]
