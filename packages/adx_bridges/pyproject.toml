[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adx-bridges"
version = "0.1.0"
description = "adx_bridges: long-lived subscription-CLI bridges (Claude Code, Codex, Manus) — invoked as Hermes plugin tools"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0",
  "agentdex-observe",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adx_bridges"]
