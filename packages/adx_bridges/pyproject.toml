[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "adx-bridges"
version = "1.0.0"
description = "adx_bridges: long-lived subscription-CLI bridges (Claude Code, Codex, Manus) — invoked as Hermes plugin tools"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0",
  "agentdex-observe",
  "adx-showdown",
  "httpx>=0.27",
]

[project.optional-dependencies]
manus = [
  "camoufox>=0.4.11",
  "playwright>=1.60",
]

[tool.hatch.build.targets.wheel]
packages = ["src/adx_bridges"]
