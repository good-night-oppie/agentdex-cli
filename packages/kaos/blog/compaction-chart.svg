<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI,system-ui,sans-serif">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#18ffff"/>
    </linearGradient>
    <linearGradient id="qualGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#0a0a12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e4e4ef" font-size="16" font-weight="700">Token Savings by Domain (default level)</text>
  <text x="400" y="55" text-anchor="middle" fill="#9494a8" font-size="11">10-iteration search session &bull; 3 archive reads/iter without compaction &bull; 1 digest/iter with</text>

  <!-- Legend -->
  <rect x="520" y="70" width="12" height="12" rx="2" fill="url(#barGrad)"/>
  <text x="538" y="81" fill="#9494a8" font-size="10">Tokens saved</text>
  <rect x="640" y="70" width="12" height="12" rx="2" fill="url(#qualGrad)"/>
  <text x="658" y="81" fill="#9494a8" font-size="10">Quality retained</text>

  <!-- Y-axis labels -->
  <text x="130" y="105" text-anchor="end" fill="#9494a8" font-size="11" font-weight="600">Classification</text>
  <text x="130" y="170" text-anchor="end" fill="#9494a8" font-size="11" font-weight="600">Code Generation</text>
  <text x="130" y="235" text-anchor="end" fill="#9494a8" font-size="11" font-weight="600">Research / RAG</text>
  <text x="130" y="300" text-anchor="end" fill="#9494a8" font-size="11" font-weight="600">Tool Calling</text>
  <text x="130" y="365" text-anchor="end" fill="#9494a8" font-size="11" font-weight="600">ML Training</text>

  <!-- Grid lines -->
  <line x1="145" y1="90" x2="760" y2="90" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="145" y1="155" x2="760" y2="155" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="145" y1="220" x2="760" y2="220" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="145" y1="285" x2="760" y2="285" stroke="#1f2937" stroke-width="0.5"/>
  <line x1="145" y1="350" x2="760" y2="350" stroke="#1f2937" stroke-width="0.5"/>

  <!-- Classification: 33,152 tokens saved, 100% quality -->
  <rect x="145" y="93" width="406" height="16" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <text x="558" y="105" fill="#e4e4ef" font-size="11" font-weight="600">33K tokens (84%)</text>
  <rect x="145" y="112" width="540" height="8" rx="2" fill="url(#qualGrad)" opacity="0.5"/>
  <text x="692" y="120" fill="#00e676" font-size="10">100%</text>

  <!-- Code Generation: 20,752 tokens saved, 100% quality -->
  <rect x="145" y="158" width="254" height="16" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <text x="406" y="170" fill="#e4e4ef" font-size="11" font-weight="600">21K tokens (77%)</text>
  <rect x="145" y="177" width="540" height="8" rx="2" fill="url(#qualGrad)" opacity="0.5"/>
  <text x="692" y="185" fill="#00e676" font-size="10">100%</text>

  <!-- Research / RAG: 23,870 tokens saved, 100% quality -->
  <rect x="145" y="223" width="292" height="16" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <text x="444" y="235" fill="#e4e4ef" font-size="11" font-weight="600">24K tokens (76%)</text>
  <rect x="145" y="242" width="540" height="8" rx="2" fill="url(#qualGrad)" opacity="0.5"/>
  <text x="692" y="250" fill="#00e676" font-size="10">100%</text>

  <!-- Tool Calling: 20,920 tokens saved, 100% quality -->
  <rect x="145" y="288" width="256" height="16" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <text x="408" y="300" fill="#e4e4ef" font-size="11" font-weight="600">21K tokens (77%)</text>
  <rect x="145" y="307" width="540" height="8" rx="2" fill="url(#qualGrad)" opacity="0.5"/>
  <text x="692" y="315" fill="#00e676" font-size="10">100%</text>

  <!-- ML Training: 21,197 tokens saved, 100% quality -->
  <rect x="145" y="353" width="260" height="16" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <text x="412" y="365" fill="#e4e4ef" font-size="11" font-weight="600">21K tokens (76%)</text>
  <rect x="145" y="372" width="540" height="8" rx="2" fill="url(#qualGrad)" opacity="0.5"/>
  <text x="692" y="380" fill="#00e676" font-size="10">100%</text>

  <!-- Aggregate box -->
  <rect x="145" y="405" width="615" height="55" rx="8" fill="#1a1730" stroke="#6c5ce7" stroke-width="1"/>
  <text x="160" y="425" fill="#a29bfe" font-size="12" font-weight="700">TOTAL</text>
  <text x="160" y="448" fill="#e4e4ef" font-size="14" font-weight="700">~120K tokens saved per search</text>
  <text x="500" y="425" fill="#9494a8" font-size="11">78% reduction</text>
  <text x="500" y="448" fill="#00e676" font-size="11" font-weight="600">~$108/month saved at 10 searches/day</text>
</svg>
