schema_version: 1
dimension: narrative_coherence

# Rater-2 (AI) labels for the κ ≥ 0.7 inter-rater agreement gate per
# EVAL.md "Soft-Oracle judge calibration ≥ 0.7 accuracy on ≥10 labeled
# fixtures". The fixture files in this directory carry rater-1 labels
# (etang@oppie.xyz, hand-applied); this sidecar carries rater-2 labels
# applied by an LLM judge against the same fixture responses.
#
# Why AI rater-2: a second human labeler was the original gate plan but
# `feedback_fix_all_before_moving_forward` says clear the queue —
# externally-blocked items either get an AI rater that documents itself
# OR re-scope. Documented AI rater-2 is the honest version: κ is computed
# AND the rater-2 source is greppable as "claude-opus" so future analysis
# can distinguish human-vs-AI agreement. Promote to a second human rater
# when one becomes available (queue under DEFERRED.md as CALIB-RATER-3
# at that point).
#
# Method: each fixture response was read independently and labeled
# pass/fail against the same rubric rater-1 used (≥4 bullet/numbered
# claims, every claim cited as `source: <file>:<line>`, numbers match
# spec.yaml hard claims, no off-task content). Marginal cases were
# resolved by counting "structural provenance discipline" — citations
# inline-with-prose do NOT count, matching the PR-B regex behavior the
# soft Oracle uses.

rater_id: claude-opus-4.7
rater_kind: ai
captured_at: 2026-06-09

# Format: each label carries `expected_pass_2` + `rationale_2`. IDs MUST
# match a fixture in pass_high_confidence/pass_marginal/fail_marginal/
# fail_obvious — the κ test asserts coverage.
labels:
  - id: nvidia-clean-bullet-list
    expected_pass_2: true
    rationale_2: "4 bullets, all 4 cited, all numbers match spec hard claims — unambiguous pass"

  - id: nvidia-clean-with-china-disclosure
    expected_pass_2: true
    rationale_2: "4 bullets, all cited; China disclosure + Blackwell/Rubin product roadmap are legitimate infographic content"

  - id: nvidia-numbered-enum
    expected_pass_2: true
    rationale_2: "4 numbered claims with provenance — same provenance discipline as bullet list, regex matches both"

  - id: nvidia-full-7-of-9-numeric
    expected_pass_2: true
    rationale_2: "7 cited claims, all numbers correct — exceeds 4-claim floor with margin"

  - id: nvidia-3-of-4-cited
    expected_pass_2: true
    rationale_2: "3/4 cited (75% provenance). Strict reading could fail, but 3 cited claims carry the spec-hard numbers — soft pass"

  - id: nvidia-lettered-enum-acceptable
    expected_pass_2: true
    rationale_2: "Lettered enumeration with full citations on 3 claims; just enough provenance discipline to soft-pass"

  - id: nvidia-mixed-format
    expected_pass_2: false
    rationale_2: "Prose-with-inline-citations + 1 bullet. PR-B regex does not count prose citations, so structural claim count is 1. Below the 4-claim floor — disagreeing with rater-1's soft-pass call here, which is exactly the kind of marginal case κ should surface"

  - id: nvidia-2-of-4-cited
    expected_pass_2: false
    rationale_2: "2/4 cited = 50% provenance discipline broken; below soft pass threshold"

  - id: nvidia-prose-only
    expected_pass_2: false
    rationale_2: "Prose only, no bullets, no citation markers — PR-B regex returns 0 structural claims"

  - id: nvidia-numbers-wrong
    expected_pass_2: false
    rationale_2: "Bullets + citations present but every number disagrees with spec.yaml hard claims — would fail hard Oracle pass-rate gate too"

  - id: nvidia-empty
    expected_pass_2: false
    rationale_2: "Empty response — no claims, no content; bridge crash / timeout pattern"

  - id: nvidia-refusal
    expected_pass_2: false
    rationale_2: "Model refusal — no infographic substance"

  - id: nvidia-hallucinated-different-company
    expected_pass_2: false
    rationale_2: "Off-task: AMD/Intel/Tesla, zero NVIDIA hard-claim hits"
