[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdex-engine"
version = "0.1.0"
description = "agentdex engine: Three Cards (Task/Result/Evolution) + Oracle layer + Pareto judge + battles/modules"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.0",
  "pyyaml>=6.0",
  "blake3>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentdex_engine"]
