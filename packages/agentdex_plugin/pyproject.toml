[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdex-plugin"
version = "1.0.0"
description = "agentdex Hermes plugin: tools + commands + hooks + KAOS-backed memory provider; kind=standalone"
requires-python = ">=3.11"
dependencies = [
  "hermes-agent>=0.15.1",
  "pyyaml>=6.0",
  "agentdex-engine",
  "agentdex-cli",
]

[project.entry-points."hermes_agent.plugins"]
agentdex = "agentdex_plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/agentdex_plugin"]
