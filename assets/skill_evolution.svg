<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 730" width="880" height="730">
  <defs>
    <linearGradient id="titleG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D44040"/>
      <stop offset="40%" stop-color="#F0B040"/>
      <stop offset="100%" stop-color="#4A90D4"/>
    </linearGradient>
    <linearGradient id="timelineG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D44040"/>
      <stop offset="50%" stop-color="#F0B040"/>
      <stop offset="100%" stop-color="#4A90D4"/>
    </linearGradient>
    <filter id="wGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes nodePulse{0%,100%{opacity:1}50%{opacity:.6}}
    @keyframes arrowFlow{0%{stroke-dashoffset:16}100%{stroke-dashoffset:0}}
    @keyframes newBadge{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes receiverPulse{0%,100%{opacity:1}50%{opacity:.7}}
    @keyframes inheritGlow{0%,100%{opacity:.4}50%{opacity:.7}}
    .screen-dot{animation:dotPulse 2s infinite}
    .tl-node{animation:nodePulse 2.5s ease-in-out infinite}
    .tl-node-2{animation:nodePulse 2.5s ease-in-out infinite .4s}
    .tl-node-3{animation:nodePulse 2.5s ease-in-out infinite .8s}
    .arrow-flow{animation:arrowFlow 1s linear infinite}
    .new-marker{animation:newBadge 2s ease-in-out infinite}
    .receiver-dot{animation:receiverPulse 2s ease-in-out infinite}
    .inherit-aura{animation:inheritGlow 3s ease-in-out infinite}
  </style>

  <!-- Background -->
  <rect width="880" height="730" rx="18" fill="#FFFFFF"/>
  <rect width="880" height="730" rx="18" fill="none" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="16" font-weight="800" letter-spacing="5" fill="url(#titleG)">SKILL EVOLUTION</text>
  <text x="440" y="72" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="24" font-weight="900" fill="#0F172A">Four Users, One Skill, Continuous Growth</text>

  <!-- Timeline vertical line -->
  <line x1="440" y1="95" x2="440" y2="570" stroke="url(#timelineG)" stroke-width="3" opacity=".2"/>


  <!-- STEP 1: USER A -->
  <circle cx="440" cy="155" r="11" fill="#FFFFFF" stroke="#D44040" stroke-width="3" class="tl-node" filter="url(#wGlow)"/>

  <!-- Left: User A -->
  <g transform="translate(225,125)">
    <text x="130" y="18" text-anchor="end" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#0F172A">User A</text>
    <text x="130" y="40" text-anchor="end" font-family="Inter,sans-serif" font-size="14" fill="#64748B">Debug DB connection issue</text>
    <rect x="145" y="6" width="40" height="28" rx="5" fill="#F0F7FF" stroke="#C2D9F0" stroke-width="1"/>
    <circle cx="165" cy="20" r="4" fill="#4A90D4" class="screen-dot"/>
    <rect x="155" y="37" width="20" height="3" rx="1" fill="#C2D9F0"/>
  </g>

  <!-- Arrow A -->
  <line x1="418" y1="155" x2="472" y2="155" stroke="#D44040" stroke-width="2" stroke-dasharray="5 4" opacity=".4" class="arrow-flow"/>

  <!-- Skill Card v1 -->
  <rect x="485" y="108" width="330" height="100" rx="14" fill="#FFFFFF" stroke="#F0CDCB" stroke-width="1.2"/>
  <rect x="504" y="120" width="140" height="22" rx="5" fill="#FCEAEA"/>
  <text x="574" y="136" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="800" letter-spacing=".5" fill="#D44040">v1.0 - auto-generated</text>
  <text x="504" y="162" font-family="Inter,sans-serif" font-size="17" font-weight="800" fill="#0F172A">DatabaseCheckSkill</text>
  <circle cx="512" cy="184" r="4.5" fill="#D44040" class="new-marker"/>
  <text x="523" y="188" font-family="Inter,sans-serif" font-size="13" fill="#D44040" font-weight="600">check_connection</text>
  <circle cx="670" cy="184" r="4.5" fill="#D44040" class="new-marker"/>
  <text x="681" y="188" font-family="Inter,sans-serif" font-size="13" fill="#D44040" font-weight="600">check_db_config</text>


  <!-- STEP 2: USER B -->
  <circle cx="440" cy="300" r="11" fill="#FFFFFF" stroke="#D4853A" stroke-width="3" class="tl-node-2" filter="url(#aGlow)"/>

  <!-- Right: User B -->
  <g transform="translate(462,270)">
    <rect x="0" y="6" width="40" height="28" rx="5" fill="#F0F7FF" stroke="#C2D9F0" stroke-width="1"/>
    <circle cx="20" cy="20" r="4" fill="#4A90D4" class="screen-dot" style="animation-delay:.5s"/>
    <rect x="10" y="37" width="20" height="3" rx="1" fill="#C2D9F0"/>
    <text x="52" y="18" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#0F172A">User B</text>
    <text x="52" y="40" font-family="Inter,sans-serif" font-size="14" fill="#64748B">Locate connection pool bottleneck</text>
  </g>

  <!-- Arrow B -->
  <line x1="462" y1="300" x2="408" y2="300" stroke="#D4853A" stroke-width="2" stroke-dasharray="5 4" opacity=".4" class="arrow-flow"/>

  <!-- Skill Card v2 -->
  <rect x="65" y="248" width="330" height="115" rx="14" fill="#FFFFFF" stroke="#F0DECA" stroke-width="1.2"/>
  <rect x="84" y="260" width="125" height="22" rx="5" fill="#FDF3E8"/>
  <text x="146" y="276" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="800" letter-spacing=".5" fill="#D4853A">v2.0 - auto-evolved</text>
  <text x="84" y="302" font-family="Inter,sans-serif" font-size="17" font-weight="800" fill="#0F172A">DatabaseCheckSkill</text>
  <circle cx="92" cy="322" r="3.5" fill="#94A3B8"/>
  <text x="102" y="326" font-family="Inter,sans-serif" font-size="12.5" fill="#94A3B8">check_connection</text>
  <circle cx="248" cy="322" r="3.5" fill="#94A3B8"/>
  <text x="258" y="326" font-family="Inter,sans-serif" font-size="12.5" fill="#94A3B8">check_db_config</text>
  <circle cx="92" cy="344" r="4.5" fill="#D4853A" class="new-marker"/>
  <text x="103" y="348" font-family="Inter,sans-serif" font-size="12.5" font-weight="600" fill="#D4853A">check_connection_pool</text>
  <circle cx="280" cy="344" r="4.5" fill="#D4853A" class="new-marker"/>
  <text x="291" y="348" font-family="Inter,sans-serif" font-size="12.5" font-weight="600" fill="#D4853A">check_slow_query_log</text>


  <!-- STEP 3: USER C -->
  <circle cx="440" cy="450" r="11" fill="#FFFFFF" stroke="#4A90D4" stroke-width="3" class="tl-node-3" filter="url(#cGlow)"/>

  <!-- Left: User C -->
  <g transform="translate(225,420)">
    <text x="130" y="18" text-anchor="end" font-family="Inter,sans-serif" font-size="18" font-weight="800" fill="#0F172A">User C</text>
    <text x="130" y="40" text-anchor="end" font-family="Inter,sans-serif" font-size="14" fill="#64748B">Find slow-query root cause</text>
    <rect x="145" y="6" width="40" height="28" rx="5" fill="#F0F7FF" stroke="#C2D9F0" stroke-width="1"/>
    <circle cx="165" cy="20" r="4" fill="#4A90D4" class="screen-dot" style="animation-delay:1s"/>
    <rect x="155" y="37" width="20" height="3" rx="1" fill="#C2D9F0"/>
  </g>

  <!-- Arrow C -->
  <line x1="418" y1="450" x2="472" y2="450" stroke="#4A90D4" stroke-width="2" stroke-dasharray="5 4" opacity=".4" class="arrow-flow"/>

  <!-- Skill Card v3 -->
  <rect x="485" y="392" width="330" height="128" rx="14" fill="#F5F9FF" stroke="#B8D4F0" stroke-width="1.2"/>
  <rect x="504" y="404" width="125" height="22" rx="5" fill="#E4F0FC"/>
  <text x="566" y="420" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="800" letter-spacing=".5" fill="#4A90D4">v3.0 - auto-evolved</text>
  <text x="504" y="446" font-family="Inter,sans-serif" font-size="17" font-weight="800" fill="#0F172A">DatabaseCheckSkill</text>
  <circle cx="512" cy="464" r="3.5" fill="#94A3B8"/>
  <text x="522" y="468" font-family="Inter,sans-serif" font-size="12" fill="#94A3B8">check_connection</text>
  <circle cx="652" cy="464" r="3.5" fill="#94A3B8"/>
  <text x="662" y="468" font-family="Inter,sans-serif" font-size="12" fill="#94A3B8">check_db_config</text>
  <circle cx="512" cy="483" r="3.5" fill="#94A3B8"/>
  <text x="522" y="487" font-family="Inter,sans-serif" font-size="12" fill="#94A3B8">check_connection_pool</text>
  <circle cx="688" cy="483" r="3.5" fill="#94A3B8"/>
  <text x="698" y="487" font-family="Inter,sans-serif" font-size="12" fill="#94A3B8">check_slow_query_log</text>
  <circle cx="512" cy="502" r="4.5" fill="#4A90D4" class="new-marker"/>
  <text x="523" y="506" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#2B6FAC">check_query_plan</text>
  <circle cx="670" cy="502" r="4.5" fill="#4A90D4" class="new-marker"/>
  <text x="681" y="506" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#2B6FAC">check_index_usage</text>


  <!-- USER D: RECEIVER -->
  <line x1="440" y1="570" x2="440" y2="602" stroke="#4A90D4" stroke-width="2.5" opacity=".2"/>

  <!-- Aura -->
  <ellipse cx="440" cy="650" rx="240" ry="55" fill="#EBF4FF" opacity=".5" class="inherit-aura"/>

  <!-- Receiver node -->
  <circle cx="440" cy="610" r="13" fill="#FFFFFF" stroke="#4A90D4" stroke-width="3" class="receiver-dot" filter="url(#dGlow)"/>

  <!-- User D workstation -->
  <rect x="394" y="600" width="34" height="22" rx="4" fill="#F0F7FF" stroke="#B8D4F0" stroke-width="1"/>
  <circle cx="411" cy="611" r="3.5" fill="#4A90D4" class="screen-dot" style="animation-delay:1.5s"/>

  <!-- User D info -->
  <text x="440" y="640" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="800" fill="#2B6FAC">User D</text>
  <text x="440" y="662" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#64748B">First time, same problem &#8212; inherits all experience instantly</text>

  <!-- Badges -->
  <rect x="175" y="678" width="175" height="30" rx="15" fill="#EBF4FF" stroke="#C2D9F0" stroke-width="1"/>
  <text x="262" y="698" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#2B6FAC">DatabaseCheckSkill v3.0</text>

  <rect x="364" y="678" width="120" height="30" rx="15" fill="#EBF4FF" stroke="#C2D9F0" stroke-width="1"/>
  <text x="424" y="698" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#2B6FAC">6 capabilities</text>

  <rect x="498" y="678" width="135" height="30" rx="15" fill="#EBF4FF" stroke="#C2D9F0" stroke-width="1"/>
  <text x="565" y="698" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="700" fill="#2B6FAC">3 users&#39; wisdom</text>
</svg>
