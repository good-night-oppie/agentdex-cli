# kaos.yaml — agentdex-cli KAOS config
# Canonical shared DB — same pool as harness-engineering and bene-main. GOO-19.

database:
  path: ~/.kaos/kaos.db
  wal_mode: true
  compression: zstd

models:
  claude-sonnet:
    provider: claude_code
    model_id: claude-sonnet-4-6
    max_context: 200000
    timeout: 1800
    use_for: [trivial, moderate, complex, critical, code_completion, code_generation, planning]

router:
  type: tier
  fallback_model: claude-sonnet
  context_compression: true
  max_retries: 1
